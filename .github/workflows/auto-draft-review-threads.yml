name: "PR: Auto Draft on Review Threads"

on:
  pull_request_target:
    types: [opened, reopened, synchronize, converted_to_draft, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  workflow_dispatch:
    inputs:
      pr-number:
        description: "PR number to check. Leave empty to scan all open PRs."
        required: false
        type: number
  schedule:
    # Fallback for review thread resolved/unresolved changes because GitHub
    # Actions does not support pull_request_review_thread as a workflow trigger.
    - cron: "2/5 * * * *"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'schedule' && 'scheduled-scan' || github.event_name == 'workflow_dispatch' && 'manual-dispatch' || format('pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: ${{ github.event_name == 'schedule' }}

jobs:
  sync-draft-state:
    # Review events on fork PRs get a read-only token. The scheduled/default-branch
    # run handles those PRs with the repository token instead.
    if: >-
      ${{
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'pull_request_target' ||
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    env:
      AUTO_DRAFT_LABEL: "auto-draft: unresolved review"
      AUTO_DRAFT_COMMENT_MARKER: "<!-- auto-draft-review-threads -->"
      AI_REVIEWERS: "coderabbitai[bot],github-copilot[bot],copilot-pull-request-reviewer[bot]"
      AI_REVIEWER_APPS: "coderabbitai"
    steps:
      - name: Sync draft state
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const markerLabel = process.env.AUTO_DRAFT_LABEL;
            const commentMarker = process.env.AUTO_DRAFT_COMMENT_MARKER;
            const aiReviewers = new Set(
              (process.env.AI_REVIEWERS || "")
                .split(",")
                .map((login) => login.trim().toLowerCase())
                .filter(Boolean),
            );
            const aiReviewerApps = new Set(
              (process.env.AI_REVIEWER_APPS || "")
                .split(",")
                .map((login) => login.trim().toLowerCase())
                .filter(Boolean),
            );

            const targetPrNumber = getTargetPullRequestNumber();
            const pullRequests = targetPrNumber
              ? [{ number: targetPrNumber }]
              : await github.paginate(github.rest.pulls.list, {
                  owner,
                  repo,
                  state: "open",
                  per_page: 100,
                });

            if (pullRequests.length === 0) {
              core.info("No open pull requests to check.");
              return;
            }

            const codeOwnersByRef = new Map();

            for (const item of pullRequests) {
              await syncPullRequest(item.number);
            }

            function getTargetPullRequestNumber() {
              const input = context.payload.inputs?.["pr-number"];
              const payloadNumber = context.payload.pull_request?.number;
              const raw = input ?? payloadNumber;

              if (raw === null || raw === undefined) {
                return null;
              }

              const parsed = Number(raw);
              if (!Number.isInteger(parsed) || parsed <= 0) {
                throw new Error(`Invalid pull request number: ${raw}`);
              }

              return parsed;
            }

            async function syncPullRequest(number) {
              const pullRequest = await fetchPullRequest(number);

              if (!pullRequest || pullRequest.state !== "OPEN") {
                core.info(`#${number}: pull request is not open, skipping.`);
                return;
              }

              let codeOwnerRules = codeOwnersByRef.get(pullRequest.baseRefName);
              if (!codeOwnerRules) {
                const content = await fetchCodeOwners(pullRequest.baseRefName);
                codeOwnerRules = parseCodeOwners(content);
                codeOwnersByRef.set(pullRequest.baseRefName, codeOwnerRules);
              }

              const blockingThreads = getBlockingThreads(pullRequest, codeOwnerRules);
              const trustedReviews = getLatestTrustedReviews(pullRequest);
              const blockingReviews = getBlockingReviews(trustedReviews);
              const approvingReviews = getApprovingReviews(trustedReviews);
              const labels = new Set(pullRequest.labels.nodes.map((label) => label.name));
              const hasMarker = labels.has(markerLabel);
              const allTrackedFeedbackResolved = blockingThreads.length === 0 && blockingReviews.length === 0;
              const hasTrustedApproval = approvingReviews.length > 0;
              const shouldMarkReady = allTrackedFeedbackResolved || hasTrustedApproval;
              const hasBlockingFeedback = !shouldMarkReady && (blockingThreads.length > 0 || blockingReviews.length > 0);

              core.info(
                `#${number}: ${blockingThreads.length} unresolved blocking review thread(s), ${blockingReviews.length} blocking review(s), ${approvingReviews.length} approving review(s), draft=${pullRequest.isDraft}, auto-marker=${hasMarker}.`,
              );

              for (const thread of blockingThreads.slice(0, 10)) {
                core.info(`#${number}: blocking ${thread.source} comment by ${thread.author} in ${thread.path}: ${thread.url}`);
              }

              for (const review of blockingReviews.slice(0, 10)) {
                core.info(`#${number}: blocking ${review.source} review by ${review.author}: ${review.url}`);
              }

              for (const review of approvingReviews.slice(0, 10)) {
                core.info(`#${number}: approving ${review.source} review by ${review.author}: ${review.url}`);
              }

              if (hasBlockingFeedback) {
                if (!pullRequest.isDraft) {
                  await addLabel(number, markerLabel);
                  await upsertAutoDraftComment(number, blockingThreads, blockingReviews);
                  await convertToDraft(pullRequest.id);
                  core.info(`#${number}: converted to draft.`);
                } else if (hasMarker) {
                  await upsertAutoDraftComment(number, blockingThreads, blockingReviews);
                  core.info(`#${number}: already auto-drafted.`);
                } else {
                  const deletedComments = await deleteAutoDraftComments(number);
                  if (deletedComments > 0) {
                    core.info(`#${number}: removed stale auto-draft comment(s) from manual draft.`);
                  }
                  core.info(`#${number}: already draft without marker; leaving it as a manual draft.`);
                }

                return;
              }

              if (shouldMarkReady && pullRequest.isDraft && hasMarker) {
                await markReadyForReview(pullRequest.id);
                await cleanupAutoDraftState(number);
                core.info(`#${number}: tracked review feedback is no longer blocking, marked ready for review and removed auto-draft state.`);
                return;
              }

              if (!pullRequest.isDraft) {
                const deletedComments = await cleanupAutoDraftState(number, hasMarker);
                if (hasMarker || deletedComments > 0) {
                  core.info(`#${number}: removed stale auto-draft state.`);
                }
                return;
              }

              const deletedComments = await deleteAutoDraftComments(number);
              if (deletedComments > 0) {
                core.info(`#${number}: removed stale auto-draft comment(s) from manual draft.`);
              }
            }

            async function fetchPullRequest(number) {
              const pullRequest = await fetchPullRequestBase(number);

              if (!pullRequest) {
                return null;
              }

              pullRequest.reviewThreads = {
                nodes: await fetchReviewThreads(number),
              };
              pullRequest.reviews = {
                nodes: await fetchReviews(number),
              };

              return pullRequest;
            }

            async function fetchPullRequestBase(number) {
              const result = await github.graphql(
                `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      id
                      number
                      state
                      isDraft
                      baseRefName
                      labels(first: 100) {
                        nodes {
                          name
                        }
                      }
                    }
                  }
                }
                `,
                { owner, repo, number },
              );

              return result.repository.pullRequest;
            }

            async function fetchReviewThreads(number) {
              const reviewThreads = [];
              let cursor = null;

              do {
                const result = await github.graphql(
                  `
                  query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 100, after: $cursor) {
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                          nodes {
                            id
                            isResolved
                            isOutdated
                            path
                            comments(first: 1) {
                              nodes {
                                url
                                author {
                                  login
                                  __typename
                                }
                                authorAssociation
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                  `,
                  { owner, repo, number, cursor },
                );

                const pullRequest = result.repository.pullRequest;

                reviewThreads.push(...pullRequest.reviewThreads.nodes);
                cursor = pullRequest.reviewThreads.pageInfo.hasNextPage
                  ? pullRequest.reviewThreads.pageInfo.endCursor
                  : null;
              } while (cursor);

              return reviewThreads;
            }

            async function fetchReviews(number) {
              const reviews = [];
              let cursor = null;

              do {
                const result = await github.graphql(
                  `
                  query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) {
                        reviews(first: 100, after: $cursor) {
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                          nodes {
                            state
                            submittedAt
                            url
                            authorCanPushToRepository
                            author {
                              login
                              __typename
                            }
                          }
                        }
                      }
                    }
                  }
                  `,
                  { owner, repo, number, cursor },
                );

                const pullRequest = result.repository.pullRequest;

                reviews.push(...pullRequest.reviews.nodes);
                cursor = pullRequest.reviews.pageInfo.hasNextPage
                  ? pullRequest.reviews.pageInfo.endCursor
                  : null;
              } while (cursor);

              return reviews;
            }

            async function fetchCodeOwners(ref) {
              for (const path of [".github/CODEOWNERS", "CODEOWNERS", "docs/CODEOWNERS"]) {
                try {
                  const response = await github.rest.repos.getContent({
                    owner,
                    repo,
                    path,
                    ref,
                  });

                  if (!Array.isArray(response.data) && response.data.type === "file") {
                    core.info(`Using CODEOWNERS from ${path} on ${ref}.`);
                    return Buffer.from(response.data.content, response.data.encoding).toString("utf8");
                  }
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }
              }

              core.warning(`No CODEOWNERS file found on ${ref}; only AI reviewers will be tracked.`);
              return "";
            }

            function parseCodeOwners(content) {
              const rules = [];

              for (const rawLine of content.split(/\r?\n/)) {
                const line = stripInlineComment(rawLine).trim();
                if (!line) {
                  continue;
                }

                const parts = line.split(/\s+/);
                if (parts.length < 2) {
                  continue;
                }

                const pattern = parts[0];
                const ownersForPattern = parts
                  .slice(1)
                  .filter((part) => part.startsWith("@"))
                  .map((part) => part.slice(1).toLowerCase());

                if (ownersForPattern.length === 0) {
                  continue;
                }

                if (ownersForPattern.every((owner) => owner.includes("/"))) {
                  core.warning(
                    `CODEOWNERS rule "${pattern}" only lists team owners (${ownersForPattern.join(", ")}). ` +
                      "Team-only CODEOWNERS rules cannot be matched to review comment authors with the default GITHUB_TOKEN.",
                  );
                }

                rules.push({
                  pattern,
                  owners: ownersForPattern,
                  matcher: patternToRegExp(pattern),
                });
              }

              core.info(`Loaded ${rules.length} CODEOWNERS rule(s).`);
              return rules;
            }

            function stripInlineComment(line) {
              const trimmed = line.trim();
              if (!trimmed || trimmed.startsWith("#")) {
                return "";
              }

              const commentStart = line.search(/\s#/);
              return commentStart >= 0 ? line.slice(0, commentStart) : line;
            }

            function patternToRegExp(pattern) {
              let value = pattern;
              const anchored = value.startsWith("/");

              if (anchored) {
                value = value.slice(1);
              }

              if (value.endsWith("/")) {
                value += "**";
              }

              const prefix = !anchored && !value.includes("/") ? "(^|.*/)" : "^";
              return new RegExp(prefix + globToRegex(value) + "$");
            }

            function globToRegex(pattern) {
              let output = "";

              for (let index = 0; index < pattern.length; index++) {
                const char = pattern[index];

                if (char === "*") {
                  if (pattern[index + 1] === "*") {
                    output += ".*";
                    index++;
                  } else {
                    output += "[^/]*";
                  }
                } else if (char === "?") {
                  output += "[^/]";
                } else {
                  output += escapeRegExp(char);
                }
              }

              return output;
            }

            function escapeRegExp(value) {
              return value.replace(/[\\^$+?.()|[\]{}]/g, "\\$&");
            }

            function isAiReviewer(author) {
              const login = author?.login?.toLowerCase();
              if (!login) {
                return false;
              }

              if (aiReviewers.has(login)) {
                return true;
              }

              return author?.__typename?.toLowerCase() === "bot" && aiReviewerApps.has(login);
            }

            function getBlockingThreads(pullRequest, codeOwnerRules) {
              const blocking = [];

              for (const thread of pullRequest.reviewThreads.nodes) {
                if (thread.isResolved) {
                  continue;
                }

                const codeOwners = new Set(getOwnersForPath(thread.path, codeOwnerRules));
                const blockingComment = thread.comments.nodes[0];
                const login = blockingComment?.author?.login?.toLowerCase();
                const isAi = isAiReviewer(blockingComment?.author);

                if (login && (isAi || codeOwners.has(login))) {
                  blocking.push({
                    path: thread.path,
                    author: blockingComment.author.login,
                    source: isAi ? "AI reviewer" : "CODEOWNER",
                    url: blockingComment.url,
                  });
                }
              }

              return blocking;
            }

            function getLatestTrustedReviews(pullRequest) {
              const latestReviewsByAuthor = new Map();
              const decisiveReviewStates = new Set(["APPROVED", "CHANGES_REQUESTED", "DISMISSED"]);

              for (const review of pullRequest.reviews.nodes) {
                const login = review.author?.login?.toLowerCase();
                if (!login || !review.submittedAt) {
                  continue;
                }

                if (!decisiveReviewStates.has(review.state)) {
                  continue;
                }

                const trustedReviewer = review.authorCanPushToRepository || isAiReviewer(review.author);
                if (!trustedReviewer) {
                  continue;
                }

                const existing = latestReviewsByAuthor.get(login);
                if (!existing || new Date(existing.submittedAt) <= new Date(review.submittedAt)) {
                  latestReviewsByAuthor.set(login, review);
                }
              }

              return Array.from(latestReviewsByAuthor.values());
            }

            function getBlockingReviews(trustedReviews) {
              return trustedReviews
                .filter((review) => review.state === "CHANGES_REQUESTED")
                .map(reviewToLogItem);
            }

            function getApprovingReviews(trustedReviews) {
              return trustedReviews
                .filter((review) => {
                  const login = review.author?.login?.toLowerCase();
                  return review.state === "APPROVED" && login && !isAiReviewer(review.author);
                })
                .map(reviewToLogItem);
            }

            function reviewToLogItem(review) {
              return {
                author: review.author.login,
                source: isAiReviewer(review.author) ? "AI reviewer" : "writer",
                url: review.url,
              };
            }

            function getOwnersForPath(path, rules) {
              let owners = [];

              for (const rule of rules) {
                if (rule.matcher.test(path)) {
                  owners = rule.owners;
                }
              }

              return owners;
            }

            async function addLabel(number, label) {
              await ensureLabel(label);
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: number,
                labels: [label],
              });
            }

            async function ensureLabel(label) {
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label,
                    color: "d4c5f9",
                    description: "PR was automatically drafted because tracked review feedback is unresolved.",
                  });
                } catch (createError) {
                  if (createError.status !== 422) {
                    throw createError;
                  }
                }
              }
            }

            async function removeLabel(number, label) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: number,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            async function cleanupAutoDraftState(number, shouldRemoveLabel = true) {
              if (shouldRemoveLabel) {
                await removeLabel(number, markerLabel);
              }

              return await deleteAutoDraftComments(number);
            }

            async function upsertAutoDraftComment(number, blockingThreads, blockingReviews) {
              const body = buildAutoDraftComment(blockingThreads, blockingReviews);
              const comments = await listAutoDraftComments(number);
              const existing = comments[comments.length - 1];
              const staleComments = comments.slice(0, -1);

              for (const comment of staleComments) {
                await deleteComment(comment);
              }

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body,
              });
            }

            async function deleteAutoDraftComments(number) {
              const comments = await listAutoDraftComments(number);

              for (const comment of comments) {
                await deleteComment(comment);
              }

              return comments.length;
            }

            async function listAutoDraftComments(number) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: number,
                per_page: 100,
              });

              return comments.filter((comment) => comment.body?.includes(commentMarker));
            }

            async function deleteComment(comment) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: comment.id,
              });
            }

            function buildAutoDraftComment(blockingThreads, blockingReviews) {
              const reviewTextEn =
                blockingReviews.length === 1
                  ? "1 active Changes requested review"
                  : `${blockingReviews.length} active Changes requested reviews`;
              const threadTextEn =
                blockingThreads.length === 1
                  ? "1 unresolved review conversation"
                  : `${blockingThreads.length} unresolved review conversations`;
              const reviewTextRu =
                blockingReviews.length === 1
                  ? "1 активное ревью Changes requested"
                  : `${blockingReviews.length} активных ревью Changes requested`;
              const threadTextRu =
                blockingThreads.length === 1
                  ? "1 незакрытый review-комментарий"
                  : `${blockingThreads.length} незакрытых review-комментариев`;

              return [
                commentMarker,
                `[RU]: PR автоматически переведен в черновик (draft), потому что есть ${threadTextRu} или ${reviewTextRu} от ревьювера с правом записи/ИИ. Чтобы снова открыть PR для ревью или мержа, закрой все отслеживаемые замечания или получи approve от ревьювера с правом записи.`,
                "",
                `[EN]: This PR was automatically converted to draft because it has ${threadTextEn} or ${reviewTextEn} from a reviewer with write access/AI. To make it ready for review or merge again, resolve all tracked feedback or get approval from a reviewer with write access.`,
              ].join("\n");
            }

            async function convertToDraft(pullRequestId) {
              await github.graphql(
                `
                mutation($pullRequestId: ID!) {
                  convertPullRequestToDraft(input: { pullRequestId: $pullRequestId }) {
                    pullRequest {
                      number
                      isDraft
                    }
                  }
                }
                `,
                { pullRequestId },
              );
            }

            async function markReadyForReview(pullRequestId) {
              await github.graphql(
                `
                mutation($pullRequestId: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                    pullRequest {
                      number
                      isDraft
                    }
                  }
                }
                `,
                { pullRequestId },
              );
            }
