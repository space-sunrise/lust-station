name: PR Check Summary

on:
  pull_request_target:
    types: [opened, reopened, synchronize, converted_to_draft, ready_for_review]
  workflow_run:
    workflows:
      - YAML Linter
      - Build & Test Debug
      - Test Packaging
      - CRLF Check
      - Map file schema validator
      - Locale Validator
      - RGA schema validator
      - RSI Validator
      - No submodule update checker
    types: [in_progress, completed]
  workflow_dispatch:
    inputs:
      pr-number:
        description: "PR number to refresh."
        required: true
        type: number

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.event.inputs['pr-number'] || github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  update-comment:
    if: >-
      ${{
        github.event_name != 'workflow_run' ||
        github.event.workflow_run.event == 'pull_request' ||
        github.event.workflow_run.event == 'pull_request_target'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted scripts
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update PR check summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR_NUMBER: ${{ github.event.inputs['pr-number'] || '' }}
        run: |
          if [ -n "$INPUT_PR_NUMBER" ]; then
            python3 Tools/_sunrise/pr_check_summary.py --pr-number "$INPUT_PR_NUMBER"
          else
            python3 Tools/_sunrise/pr_check_summary.py
          fi
