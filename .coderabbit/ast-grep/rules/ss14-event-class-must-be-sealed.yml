id: ss14-event-class-must-be-sealed
language: CSharp
severity: error
message: "Event classes should be `sealed`."
note: "Per `ss14-events`, classes deriving from `EntityEventArgs`, `HandledEntityEventArgs`, or `CancellableEntityEventArgs` should be sealed for performance and clarity."
files:
  - "Content.*/**/*.cs"
rule:
  all:
    - kind: class_declaration
    - regex: '(?s).*\bclass\s+\w+\s*:\s*(?:EntityEventArgs|HandledEntityEventArgs|CancellableEntityEventArgs)\b.*'
    - not:
        regex: '(?s).*\b(?:sealed|abstract)\b.*'
