- type: job
  id: Clown
  name: job-name-clown
  description: job-description-clown
  playTimeTracker: JobClown
  requirements:
  - !type:OverallPlaytimeRequirement
      time: 18000 #5 hrs # Sunrise-RoleTime
  startingGear: ClownGear
  icon: "JobIconClown"
  supervisors: job-supervisors-hop
  # Sunrise-Start
  alternativeTitles:
  - job-alt-title-jester
  - job-alt-title-comedian
  - job-alt-title-harlequin
  # Sunrise-End
  access:
  - Theatre
  - Maintenance
  special:
  - !type:AddComponentSpecial
    components:
    # Sunrise added start
    - type: ArtifactFunnyTarget
    - type: Crawler
      animationPullScaleMultiplier: 1.15, 0.9
      pullStartSound:
        path: /Audio/_Sunrise/Footstep/worm_start.ogg
        params:
          volume: -2
          maxDistance: 6
          variation: 0.1
      pullEndSound:
        path: /Audio/_Sunrise/Footstep/worm_end.ogg
        params:
          volume: -2
          maxDistance: 6
          variation: 0.1
    # Sunrise added end
    - type: Clumsy
      gunShootFailDamage:
        types: #literally just picked semi random valus. i tested this once and tweaked it.
          Blunt: 5
          Piercing: 4
          Heat: 3
      catchingFailDamage:
        types:
          Blunt: 1
    - type: SleepEmitSound
      snore: /Audio/Voice/Misc/silly_snore.ogg
      interval: 10
  - !type:AddImplantSpecial
    implants: [ SadTromboneImplant ]

- type: startingGear
  id: ClownGear
  equipment:
    mask: ClothingMaskClown
    pocket1: BikeHorn
    pocket2: ClownRecorder
    id: ClownPDA
    ears: ClothingHeadsetService
  inhand:
  - FoolboxFilled
  storage:
    back:
    - RubberStampClown
    - CrayonRainbow

- type: chameleonOutfit
  id: ClownChameleonOutfit
  job: Clown
  equipment:
    head: ClothingHeadHatXmasCrown
    eyes: ClothingEyesGlassesCheapSunglasses
    neck: ClothingHeadHatFlowerWreath
    outerClothing: ClothingOuterClownPriest
    gloves: ClothingHandsGlovesColorYellowBudget
