- type: job
  id: Passenger
  name: job-name-passenger
  description: job-description-passenger
  playTimeTracker: JobPassenger
  startingGear: PassengerGear
  icon: "JobIconPassenger"
  supervisors: job-supervisors-everyone
  # Sunrise-Start
  alternativeTitles:
  - job-alt-title-tourist
  - job-alt-title-assistant
  - job-alt-title-off-duty-crew
  # Sunrise-End
  access:
  - Maintenance
  # Sunrise added start
  special:
  - !type:AddComponentSpecial
    components:
    - type: Crawler
      animationPullScaleMultiplier: 1.15, 0.9
      pullStartSound:
        path: /Audio/_Sunrise/Footstep/worm_start.ogg
        params:
          volume: -2
          maxDistance: 6
          variation: 0.1
      pullEndSound:
        path: /Audio/_Sunrise/Footstep/worm_end.ogg
        params:
          volume: -2
          maxDistance: 6
          variation: 0.1
    # Sunrise added end

- type: startingGear
  id: PassengerGear
  equipment:
    id: PassengerPDA
    ears: ClothingHeadsetGrey
  #storage:
    #back:
    #- Stuff

- type: chameleonOutfit
  id: PassengerChameleonOutfit
  job: Passenger
  equipment:
    head: ClothingHeadHatWelding
    eyes: ClothingEyesGlassesCheapSunglasses
    mask: ClothingMaskGas
    neck: ClothingNeckMantle
    outerClothing: ClothingOuterWinterCoat
    gloves: ClothingHandsGlovesColorYellowBudget
