# MedTak operator loadouts
# NOTE: Team leader uses ClothingOuterHardsuitMedTakLeader (toggles Arrows leader helmet)
# Regular operators use ClothingOuterHardsuitMedTak (toggles Arrows medical helmet)

- type: startingGear
  id: MedTakTeamLead
  equipment:
    jumpsuit: ClothingUniformJumpsuitCasualRed
    back: ClothingBackpackMedTakFilledLeader
    shoes: ClothingShoesBootsCombatFilled
    outerClothing: ClothingOuterHardsuitMedTakLeader
    id: MedTakTeamLeadPDA
    eyes: ClothingEyesVisorMedTak
    ears: ClothingHeadsetAltMedTak
    mask: ClothingMaskGasSecurity
    belt: ClothingBeltMedTakFilledRifle
    gloves: ClothingHandsGlovesCombat
    suitstorage: WeaponRifleMedTak
    pocket1: PenPackMedTak
    pocket2: DoubleEmergencyOxygenTankFilled

