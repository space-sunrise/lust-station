- type: entity
  parent: EncryptionKey
  id: EncryptionKeyUGE
  name: Encryption key "United Government of Earth"
  description: The Earth government... You should definitely hear what they have to say.
  components:
  - type: EncryptionKey
    channels:
    - UGE
    - Law
    - CentCom
    - Common
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
