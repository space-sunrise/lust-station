# MedTak ID cards
# Anchor: lust-job-icon-rsi points to _Lust job icon RSI
- type: entity
  parent: IDCardStandard
  id: MedTakTeamLeadIDCard
  name: MedTak team leader ID card
  components:
    - type: Sprite
      sprite: _Lust/Objects/Misc/id_cards.rsi
      layers:
        - state: medtak
        - sprite: &lust-icon-rsi _Lust/Interface/Misc/job_icons.rsi
          offset: &lust-icon-offset -0.09375, 0.0625
          state: MedTakLeader
    - type: IdCard
      jobTitle: job-name-medtak-leader
      jobIcon: JobIconMedTakLeader
    - type: Access
      tags:
        - MedTak

