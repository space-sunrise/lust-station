- type: entity
  id: StasisBedMedTak
  name: MedTak bed
  parent: BaseMachine
  description: "A dual stasis/medical bed built for MedTak AV-40 shuttles.\nEnsure stasis is disabled before applying chemicals."
  components:
  - type: StasisBed
  - type: AntiRotOnBuckle
  - type: HealOnBuckle
    damage:
      types:
        Poison: -0.5
        Cold: -0.5
        Blunt: -0.5
  - type: Sprite
    sprite: _Lust/Admeme/Objects/MedTak/bed.rsi
    noRot: true
    layers:
    - state: bed
    - state: stasis
      map: ["unlit"]
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        unlit:
          True: { visible: true }
          False: { visible: false }
  - type: Appearance
  - type: ApcPowerReceiver
    powerLoad: 1000
  - type: ExtensionCableReceiver
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
  - type: Strap
    position: Down
    rotation: -90
    buckleOffset: 0.025, 0.0
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.05"
        density: 190
        mask:
        - LowImpassable
  - type: PowerSwitch
  - type: LitOnPowered
  - type: PointLight
    autoRot: true
    color: "#ff5656"
    radius: 2
    energy: 1
    castShadows: false
