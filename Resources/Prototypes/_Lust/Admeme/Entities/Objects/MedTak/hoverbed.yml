- type: entity
  id: MedTakHoverBed
  name: MedTak hover-stretcher
  parent: [ RollerBed, BaseMedTakContraband ]
  description: A repulsor-suspended stretcher system used by MedTak operators to transport patients.
  components:
  - type: Sprite
    sprite: _Lust/Admeme/hoverbed.rsi
    layers:
    - state: hover_unfolded
      map: ["unfoldedLayer"]
    - state: hover_folded
      map: ["foldedLayer"]
      visible: false
    - state: hover_buckled
      map: ["buckledLayer"]
      visible: false
  - type: Item
    sprite: _Lust/Admeme/hoverbed.rsi
    heldPrefix:
  - type: Pullable
    ignoreNeedsHands: True
  - type: Tag
    tags:
    - RollerBed

- type: entity
  parent: MedTakHoverBed
  id: MedTakHoverBedSpawnFolded
  suffix: folded
  components:
  - type: Foldable
    folded: true
  - type: Strap
    enabled: False
