# MedTak hardsuits
# NOTE: We use our existing Arrows medical helmets instead of MedTak-specific ones.
# ClothingOuterHardsuitMedTak → uses ClothingHeadHelmetHardsuitMedicalArrows (regular medics)
# ClothingOuterHardsuitMedTakLeader → uses ClothingHeadHelmetHardsuitMedicalLeaderArrows (team lead)

- type: entity
  parent: [ ClothingOuterHardsuitBase, BaseMedTakContraband ]
  id: ClothingOuterHardsuitMedTak
  name: MedTak operator hardsuit
  description: An armoured hardsuit worn by MedTak operators.
  components:
    - type: Sprite
      sprite: _Lust/Admeme/Clothing/OuterClothing/Hardsuits/medtak_hardsuit.rsi
    - type: Clothing
      sprite: _Lust/Admeme/Clothing/OuterClothing/Hardsuits/medtak_hardsuit.rsi
    - type: ToggleableClothing
      clothingPrototype: ClothingHeadHelmetHardsuitMedicalArrows
    - type: PressureProtection
      highPressureMultiplier: 0.05
      lowPressureMultiplier: 1000
    - type: ZombificationResistance
      zombificationResistanceCoefficient: 0.0
    - type: StaminaResistance
      damageCoefficient: 0.75
    - type: ExplosionResistance
      damageCoefficient: 0.5
    - type: Armor # ERT sec values
      modifiers:
        coefficients:
          Blunt: 0.6
          Slash: 0.6
          Piercing: 0.6
          Heat: 0.5
          Radiation: 0.5
          Caustic: 0.5
      staminaModifier: 0.3
    - type: ClothingSpeedModifier
      walkModifier: 0.9
      sprintModifier: 0.9
    - type: HeldSpeedModifier
    - type: Tag
      tags:
        - Hardsuit

- type: entity
  parent: ClothingOuterHardsuitMedTak
  id: ClothingOuterHardsuitMedTakLeader
  name: MedTak team leader hardsuit
  description: An armoured hardsuit worn by MedTak team leaders.
  components:
    - type: ToggleableClothing
      clothingPrototype: ClothingHeadHelmetHardsuitMedicalLeaderArrows
