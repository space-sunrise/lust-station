# LMG
- type: entity
  name: CODE-6 "Arbitration"
  id: WeaponLightMachineGunMedTak
  parent: [ BaseWeaponLightMachineGun, BaseMedTakContraband ]
  description: "An ultralight assault LMG developed for MedTak security.\nAccepts .30 box magazines."
  components:
  - type: Sprite
    sprite: _Lust/Admeme/Weapons/MedTak/LMG.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-5
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: Appearance
  - type: Item
    sprite: _Lust/Admeme/Weapons/MedTak/LMG.rsi
  - type: Clothing
    sprite: _Lust/Admeme/Weapons/MedTak/LMG.rsi
    quickEquip: false
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/sf_rifle_cock.ogg
    soundBoltClosed:
      path: /Audio/Weapons/Guns/Bolt/rifle_bolt_closed.ogg
    soundBoltOpened:
      path: /Audio/Weapons/Guns/Bolt/rifle_bolt_open.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: LightRifleHeavyMagazineSP
        insertSound: /Audio/Weapons/Guns/MagIn/sfrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        whitelist:
          tags:
            - LightRifleHeavy
      gun_chamber:
        name: Chamber
        startingItem: CartridgeLightRifleSP
        priority: 1
        whitelist:
          tags:
            - CartridgeLightRifle
  - type: HeldSpeedModifier
  - type: Gun
    soundGunshot:
      path: /Audio/_Lust/Weapons/Guns/Gunshots/code-6.ogg
      params:
        volume: -5
    minAngle: 15
    maxAngle: 30
    angleIncrease: 2
    angleDecay: 10
    fireRate: 8

# Rifle
- type: entity
  name: CODE-9 "Compliance"
  parent: [ BaseWeaponRifle, BaseMedTakContraband ]
  id: WeaponRifleMedTak
  description: "A bullpuped heavy rifle designed for MedTak operators.\nAccepts heavy .20 rifle magazines."
  components:
  - type: Sprite
    sprite: _Lust/Admeme/Weapons/MedTak/Rifle.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-3
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _Lust/Admeme/Weapons/MedTak/Rifle.rsi
  - type: Item
    sprite: _Lust/Admeme/Weapons/MedTak/Rifle.rsi
  - type: Gun
    fireRate: 8
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    - SemiAuto
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Guns/Gunshots/aussec.ogg
      params:
        volume: -4
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifleM52SP
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineRifleM52
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
          - CartridgeRifle
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Appearance

- type: entity
  name: CODE-9 ROW
  parent: BaseItem
  id: WeaponRifleMedTakROW
  description: "A cut-down CODE-9 designed for cyborgs, feeding from a slowly recharging internal ammo fabricator"
  components:
  - type: Sprite
    sprite: _Lust/Admeme/Weapons/MedTak/CyborgRifle.rsi
    layers:
    - state: icon
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-2
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Item
    size: Huge
  - type: Gun
    fireRate: 7
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    - SemiAuto
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Guns/Gunshots/aussec.ogg
      params:
        volume: -4
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: true
  - type: Appearance
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - CartridgeRifle
    capacity: 24
    proto: CartridgeRifleSP
    cycleable: false
  - type: BallisticAmmoSelfRefiller
    autoRefillRate: 4s
    affectedByEmp: true
  - type: AmmoCounter

# Pistol
- type: entity
  name: CODE-4 "Triage"
  description: "A heavy sidearm issued to MedTak operators.\nAccepts .40 pistol magazines."
  parent: [ BaseWeaponPistol, BaseMedTakContraband ]
  id: WeaponPistolMedTak
  components:
    - type: Gun
      fireRate: 5
      availableModes:
        - SemiAuto
      soundGunshot:
        path: /Audio/_Starlight/Weapons/Guns/Gunshots/sp8ar.ogg
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: MagazinePistol40SP
          insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
          priority: 2
          whitelist:
            tags:
              - MagazinePistolDP
          whitelistFailPopup: gun-magazine-whitelist-fail
        gun_chamber:
          name: Chamber
          startingItem: CartridgePistol40SP
          priority: 1
          whitelist:
            tags:
              - CartridgePistolDP
    - type: Sprite
      sprite: _Lust/Admeme/Weapons/MedTak/Pistol.rsi
