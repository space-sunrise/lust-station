#NeoNVD
- type: entity
  name: NeoNVD
  abstract: true
  id: InHelmetNightVisionDevice
  parent: [BaseItem]
  components:
  - type: UseDelay
    delay: 5.0
  - type: ToggleClothing
    action: NVDToggleAction
    mustEquip: true
    disableOnUnequip: true
  - type: ComponentToggler
    parent: true
    components:
      - type: NightVision
        effect: EffectNightVisionSyndie

#NeoSyndi Stalker Hardsuit
- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase, InHelmetNightVisionDevice]
  id: ClothingHeadHelmetHardsuitStalker
  categories: [ HideSpawnMenu ]
  name: шлем сталкера Cybersun
  description: Напичкан передовой военной электроникой. Самое то для поиска и устрашения.
  components:
  - type: Sprite
    sprite: _Lust/NeoSyndi/Clothing/Head/Hardsuits/stalker_cybersun.rsi
  - type: Clothing
    sprite: _Lust/NeoSyndi/Clothing/Head/Hardsuits/stalker_cybersun.rsi
  - type: PointLight
    color: black
  - type: ItemToggle
    predictable: false # issues between ToggleCellDraw and ItemToggleActiveSound
    onUse: false
    soundActivate:
      path: /Audio/_Sunrise/Items/Goggles/activate.ogg
    soundDeactivate:
      path: /Audio/_Sunrise/Items/Goggles/deactivate.ogg
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.7
  - type: FlashImmunity
  - type: Tag
    tags:
    - WhitelistChameleon

#Gorlex Phanthom Suit
- type: entity
  parent: [ClothingHeadHardsuitBase, ShowSecurityIcons, InHelmetNightVisionDevice] #[ ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetHardsuitGorlexPhantom
  categories: [ HideSpawnMenu ]
  name: шлем фантома Gorlex
  components:
  - type: Sprite
    sprite: _Lust/NeoSyndi/Clothing/Head/Hardsuits/gorlex_phanthom.rsi
  - type: Clothing
    sprite: _Lust/NeoSyndi/Clothing/Head/Hardsuits/gorlex_phanthom.rsi
  #- type: PointLight
    #color: "#880808"
  - type: PressureProtection
    highPressureMultiplier: 0.45
    lowPressureMultiplier: 10000
  - type: Pierceable
    level: Metal
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
  - type: ItemToggle
    predictable: false # issues between ToggleCellDraw and ItemToggleActiveSound
    onUse: false
    canActivateInhand: false
    soundActivate:
      path: /Audio/_Sunrise/Items/Goggles/activate.ogg
    soundDeactivate:
      path: /Audio/_Sunrise/Items/Goggles/deactivate.ogg
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
  - type: FlashImmunity
  - type: EyeProtection
  - type: ShowSyndicateIcons
  - type: Tag
    tags:
    - WhitelistChameleon

