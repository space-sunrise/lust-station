## This file contains duplicated pipe prototypes with
## different layer offsets to faciliate mapping

# Layer 1
- type: entity
  abstract: true
  id: GasPipeLayerAlt1
  components:
  - type: AtmosPipeLayers
    pipeLayer: 1
  # Sunrise edit start - mapping replacement rules
  - type: MappingReplacement
    usePrototypeId: true
    requireSameRotation: true
  # Sunrise edit end

# Layer 2
- type: entity
  abstract: true
  id: GasPipeLayerAlt2
  components:
