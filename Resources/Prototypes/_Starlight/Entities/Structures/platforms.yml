- type: entity
  abstract: true
  id: PlatformBase
  name: platform
  description: A raised surface. Wait, thats illegal!
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _Starlight/Structures/platforms.rsi
  - type: InteractionOutline
  - type: Clickable
  - type: RCDDeconstructable
    cost: 5
    delay: 7
    fx: EffectRCDDeconstruct8
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 350
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 175
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: PlatformBase
  id: Platform
  suffix: Steel
  description: A raised surface. Wait, thats illegal!
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.36"
        density: 1500
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Sprite
    sprite: _Starlight/Structures/platforms.rsi
    state: platform
    drawdepth: HighFloorObjects
  - type: Climbable
  - type: ChildEntities
    childPrototypes:
    - prototype: OverlayPlatform

