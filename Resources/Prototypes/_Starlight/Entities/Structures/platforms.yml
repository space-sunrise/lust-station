- type: entity
  abstract: true
  id: PlatformBase
  name: platform
  description: A raised surface. Wait, thats illegal!
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _Starlight/Structures/platforms.rsi
  - type: InteractionOutline
  - type: Clickable

- type: entity
  parent: PlatformBase
  id: Platform
  suffix: Steel
  description: A raised surface. Wait, thats illegal!
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.36"
        density: 1500
        mask:
        - TableMask
        layer:
        - Impassable
  - type: Sprite
    sprite: _Starlight/Structures/platforms.rsi
    state: platform
  - type: Climbable

