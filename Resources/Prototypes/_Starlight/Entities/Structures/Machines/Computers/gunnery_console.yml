- type: entity
  parent: BaseComputerAiAccess
  id: ComputerGunnery
  name: gunnery console
  description: A tactical gunnery console for selecting, aiming and remotely firing shuttle cannons.
  suffix: radar 500m
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: eris_control
    - map: ["computerLayerKeys"]
      state: security_key
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: RadarConsole
    maxRange: 512
  - type: GunneryConsole
    maxRange: 512
  - type: Anchorable
    delay: 30
  - type: RadarBlip
    color: "#00ffee"
    scale: 1.0
    shape: Square
    requireInSpace: False
  - type: Computer
    board: ComputerGunneryCircuitboard
  - type: ActivatableUI
    key: enum.GunneryConsoleUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.GunneryConsoleUiKey.Key:
        type: GunneryConsoleBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface

- type: entity
  parent: ComputerGunnery
  id: ComputerGunnery1000
  name: gunnery console
  description: A tactical gunnery console for selecting, aiming and remotely firing shuttle cannons.
  suffix: radar 1000m
  components:
  - type: RadarConsole
