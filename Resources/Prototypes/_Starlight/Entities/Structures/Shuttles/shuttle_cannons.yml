        volume: 6
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine60mmRocket
        priority: 2
        whitelist:
          tags:
          - Magazine60mmRocket
        insertSound:
          path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
          params:
            pitch: 1.5
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: Appearance
  - type: RadarBlip
    color: "#44FF88"
    scale: 1.0
    shape: Circle
    requireInSpace: true
  - type: GunneryTrackable
  - type: AutoLoader # Sunrise-Add
    container: gun_magazine
    whitelist:
      tags:
      - Magazine60mmRocket
  - type: StaticPrice
    price: 6000

# M321-CHARYBDIS 'Thanatos' 280mm Railgun - Single-shot, manually loaded, extreme damage
- type: entity
  id: ShuttleGunCharon
  parent: ShuttleGunBase
  name: M321-CHARYBDIS 'Thanatos' 280mm Railgun
  description: A single-shot electromagnetic railgun of unparalleled destructive capability. Accelerates a 280mm slug to devastating velocities. Requires manual loading of each round into the open chamber before firing. Named for the devouring whirlpool of legend - because that is what awaits those who face one.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shuttleguns/Charon.rsi
    granularLayersRendering: true
    layers:
    - sprite: _Starlight/Objects/Weapons/Guns/Turrets/pointdefense.rsi
      state: support
      renderingStrategy: NoRotation
    - state: space_artillery
  - type: ContainerContainer
    containers:
      ballistic_chamber: !type:ContainerSlot
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 500
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Anchorable
    delay: 120
  - type: Pullable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    projectileSpeed: 150    # railgun slug velocity
    fireRate: 100           # instant fire when loaded - delay is the manual reload
    burstCooldown: 180      # Starlight: 3-minute cooldown after firing
    selectedMode: Burst
    angleDecay: 90
    minAngle: 0
    maxAngle: 0             # perfect accuracy
    availableModes:
    - Burst
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Shuttleguns/leviathan_fire.ogg
      params:
        variation: 0.05
        volume: 15
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: BallisticAmmoProvider
    mayTransfer: false
    whitelist:
      tags:
      - Cartridge280mmSlug
    proto: CartridgeCharon280mmSlug
    capacity: 1
    soundRack:
      path: /Audio/Weapons/Guns/Bolt/lmg_bolt_closed.ogg
      params:
        variation: 0.05
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
      params:
        pitch: 0.6
        volume: 3
  - type: RadarBlip
    color: "#FF6600"
    scale: 1.5
    shape: Triangle
    requireInSpace: true
  - type: GunneryTrackable
  - type: StaticPrice
    price: 25000

