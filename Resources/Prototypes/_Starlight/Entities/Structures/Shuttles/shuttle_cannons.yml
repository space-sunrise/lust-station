# Starlight Shuttle Cannons

# CYERXA Dual 120mm Cannon - Based on Duster, fires 2 shots per trigger
- type: entity
  id: ShuttleGunCyerxa120mm
  parent: ShuttleGunBase
  name: CYERXA Dual 120mm Cannons
  description: A powerful dual 120mm cannon system designed for heavy shuttle combat. Fires devastating blast grenades with extreme destructive power. Each activation fires both barrels in rapid succession.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shuttleguns/cyerxa_120mm.rsi
    granularLayersRendering: true
    layers:
    - sprite: Structures/Machines/station_anchor.rsi
      state: station_anchor
      renderingStrategy: NoRotation
    - state: space_artillery
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.6
        density: 500
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Anchorable
    delay: 90
  - type: Pullable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    projectileSpeed: 50
    fireRate: 1.0
    burstFireRate: 6 # Sunrise
    shotsPerBurst: 2
    burstCooldown: 52.5
    selectedMode: Burst
    angleDecay: 30
    minAngle: 5 # Sunrise
    maxAngle: 15 # Sunrise
    availableModes:
    - Burst
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Shuttleguns/uaf_cyrexa_452.ogg
      params:
        variation: 0.05
        volume: 5
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine120mmGrenadeBlast
        priority: 2
        whitelist:
          tags:
          - MagazineGrenade120mm
        insertSound:
          path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
          params:
            pitch: 2
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: RadarBlip
    color: "#FFB300"
    scale: 1.2
    shape: Square
    requireInSpace: true
  - type: GunneryTrackable
  - type: AutoLoader # Sunrise-Add
    container: gun_magazine
    whitelist:
      tags:
      - MagazineGrenade120mm
  - type: StaticPrice
    price: 5000

# Apollo Heavy Laser Cannon - Slow firing devastating energy weapon
- type: entity
  id: ShuttleGunApollo
  parent: ShuttleGunBase
  name: Apollo Heavy Laser Cannon
  description: A devastating heavy laser cannon system designed for siege warfare. Fires an extremely powerful laser beam that melts through armor and structures. Slow recharge time between shots.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shuttleguns/Apollo.rsi
    layers:
    - state: space_artillery
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1200 # Sunrise-Edit
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    fireRate: 1
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
      params:
        variation: 0.05
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: Magazine
        startingItem: PowerCageHigh
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - PowerCage
  - type: BatteryAmmoProvider
    proto: ApolloHeavyLaser
    fireCost: 500
  - type: RadarLaserTracker
    laserColor: "#FF44FF"
    traceDuration: 0.75
    maxRange: 128.0
  - type: RadarBlip
    color: "#FF44FF"
    scale: 1.4
    shape: Square
    requireInSpace: true
  - type: GunneryTrackable
  - type: AutoLoader # Sunrise-Add
    container: cell_slot
    whitelist:
      tags:
      - PowerCage

