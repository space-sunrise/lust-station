- type: entity
  name: breaching hammer
  parent: BaseItem
  id: SyndieBreachingHammer
  description: A large, heavy hammer with a long handle, used for breaking stones or other heavy material such as the skulls of violent criminals, also perfect for forcing your way trough airlocks.
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Melee/syndie_breaching_hammer.rsi
    state: icon
  - type: Item
    size: Ginormous
  - type: MeleeWeapon
    attackRate: 1.2
    range: 2
    damage:
      types:
        Blunt: 10
        Structural: 20
    soundHit:
      collection: MetalThud
    bluntStaminaDamageFactor: 1.3
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 15
        Structural: 100
  - type: Tool
    qualities:
      - Prying
    useSound: /Audio/Items/jaws_pry.ogg
  - type: Prying
    speedModifier: 3
    pryPowered: true
    useSound: /Audio/Items/jaws_pry.ogg
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Melee/syndie_breaching_hammer.rsi
    quickEquip: false
    slots:
    - back
    - suitStorage
