# Dravon 75mm & AK570 90mm Projectiles

# --- DRAVON 75mm HE ---
- type: entity
  id: BulletDravon75mmHE
  name: DVN-75 75mm HE shell
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: grenade
    scale: 1.2, 1.2
  - type: Projectile
    damage:
      types:
        Piercing: 60
        Structural: 80
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 180      # medium-light blast, ~4 tile radius
    intensitySlope: 6
    maxIntensity: 20
    canCreateVacuum: true
  - type: PointLight
    enabled: true
    radius: 2.5
    energy: 1.5
    color: "#ff6600"
  - type: RadarBlip
    color: "#FFB300"
    scale: 0.9
    shape: Square
    requireInSpace: true

