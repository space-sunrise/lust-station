# Shuttle Artillery Ammunition
# Covers: M321-CHARYBDIS 280mm, Dravon 75mm, AK570 90mm, Leviathan 240mm

# Base Charybdis 280mm cartridge (abstract)
- type: entity
  abstract: true
  parent: [BaseCartridge, BaseMajorContraband] # Sunrise-Edit
  id: BaseCharon280mmCartridge
  name: base 280mm Charybdis cartridge
  categories: [ HideSpawnMenu ] # Sunrise-Add
  components:
  - type: Tag
    tags:
    - Cartridge280mmSlug
  - type: Item
    size: Ginormous # Sunrise-Edit
  - type: DamageOnLand # Sunrise-Add
    damage:
      types:
        Blunt: 100

# M381 CHARYBDIS 280mm 26.5kg Slug
# A massive kinetic penetrator. Pierces through targets and structures before detonating.
- type: entity
  parent: BaseCharon280mmCartridge
  id: CartridgeCharon280mmSlug
  name: M381 CHARYBDIS 280mm 26.5kg slug
  description: >-
    A 26.5 kilogram depleted-tungsten penetrator round for the M321-CHARYBDIS 'Thanatos' railgun system.
    The slug punches through multiple targets and structural layers before its delayed fuse detonates.
    Handle with extreme care. Requires manual chamber loading.
  suffix: Slug
  components:
  - type: CartridgeAmmo
    proto: BulletCharon280mmSlug
    deleteOnSpawn: true
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/ArtilleryAmmo/charon_ammo.rsi # Sunrise-Edit
    layers:
    - state: railgun_slug
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: railgun_slug
    suffix: false
  - type: StaticPrice
    price: 2000

# M381 CHARYBDIS 280mm 40KG Subnuclear Slug
# A subnuclear warhead. Detonates on impact with a catastrophic area-of-effect blast.
- type: entity
  parent: BaseCharon280mmCartridge
  id: CartridgeCharon280mmSubnuclear
  name: M381 CHARYBDIS 280mm 40kg subnuclear slug
  description: >-
    A 40 kilogram subnuclear warhead packaged as a railgun slug for the M321-CHARYBDIS 'Thanatos' system.
    Detonates on first contact, producing a massive subnuclear detonation with significant residual radiation.
    RESTRICTED to authorized combat operations only. Requires manual chamber loading.
  suffix: Subnuclear
  components:
  - type: CartridgeAmmo
    proto: BulletCharon280mmSubnuclear
    deleteOnSpawn: true
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/ArtilleryAmmo/charon_ammo.rsi # Sunrise-Edit
    layers:
    - state: subnuclear
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: subnuclear
    suffix: false
  - type: StaticPrice
    price: 8000

# Dravon 75mm Artillery Shell Ammunition

# Base Dravon 75mm shell (abstract)
- type: entity
  abstract: true
  parent: [BaseItem, BaseMajorContraband]
  id: BaseDravon75mmShell
  name: base 75mm Dravon shell
  categories: [ HideSpawnMenu ] # Sunrise-Add
  components:
  - type: Tag
    tags:
    - Cartridge75mmDravon
  - type: Item
    size: Normal

# Dravon 75mm HE Shell
- type: entity
  parent: BaseDravon75mmShell
  id: CartridgeDravon75mmHE
  name: DVN-75 75mm HE shell
  description: >-
    A 75mm high-explosive artillery shell for the Dravon cannon system.
    Detonates on impact with a solid area-of-effect blast.
  suffix: HE
  components:
  - type: CartridgeAmmo
    proto: BulletDravon75mmHE
    deleteOnSpawn: true
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    scale: 0.8, 1.15
    layers:
    - state: flash
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: blast
    suffix: false
  - type: StaticPrice
    price: 150

# 15-Round Magazine for Dravon 75mm HE
- type: entity
  parent: BaseMagazineGrenade
  id: MagazineDravon75mmHE
  name: DVN-75 75mm HE shell magazine
  description: A 15-round magazine of 75mm HE shells for the Dravon cannon system.
  components:
  - type: Tag
    tags:
    - MagazineDravon75mm
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge75mmDravon
    proto: CartridgeDravon75mmHE
    capacity: 15
    soundRack:
      path: /Audio/Weapons/Guns/Bolt/lmg_bolt_closed.ogg
      params:
        variation: 0.05
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/rifle_load.ogg
      params:
        variation: 0.05
  - type: Item
    size: Huge
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/Grenade/grenade_cartridge.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-4
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: StaticPrice
    price: 400


