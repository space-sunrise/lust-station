# Shuttle Artillery Ammunition
# Covers: M321-CHARYBDIS 280mm, Dravon 75mm, AK570 90mm, Leviathan 240mm

# Base Charybdis 280mm cartridge (abstract)
- type: entity
  abstract: true
  parent: [BaseItem, BaseMajorContraband] # Sunrise-Edit
  id: BaseCharon280mmCartridge
  name: base 280mm Charybdis cartridge
  categories: [ HideSpawnMenu ] # Sunrise-Add
  components:
  - type: Sprite
    drawdepth: Items
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.10,-0.05,0.10,0.05"
        density: 20
        mask:
          - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Tag
    tags:
    - Cartridge
    - Cartridge280mmSlug
  - type: Item
    size: Ginormous # Sunrise-Edit
  - type: EmitSoundOnLand
    sound:
      collection: CasingFall
      params:
        volume: -1
  - type: StaticPrice
    price: 1
  - type: GuideHelp
    guides:
    - SunriseAmmunition
  - type: DamageOnLand # Sunrise-Add
    ignoreResistances: true
    damage:
      types:
        Blunt: 100
  - type: Damageable
    damageContainer: Inorganic
  - type: MultiHandedItem

# M381 CHARYBDIS 280mm 26.5kg Slug
# A massive kinetic penetrator. Pierces through targets and structures before detonating.
- type: entity
  parent: BaseCharon280mmCartridge
  id: CartridgeCharon280mmSlug
  name: M381 CHARYBDIS 280mm 26.5kg slug
  description: >-
    A 26.5 kilogram depleted-tungsten penetrator round for the M321-CHARYBDIS 'Thanatos' railgun system.
    The slug punches through multiple targets and structural layers before its delayed fuse detonates.
    Handle with extreme care. Requires manual chamber loading.
  suffix: Slug
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          CartridgeCharon280mmSlugDamaged75:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: CartridgeAmmo
    proto: BulletCharon280mmSlug
    deleteOnSpawn: true
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/ArtilleryAmmo/charon_ammo.rsi # Sunrise-Edit
    layers:
    - state: railgun_slug
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: railgun_slug
    suffix: false
  - type: StaticPrice
    price: 2000
  - type: HeldSpeedModifier
    walkModifier: 0.75
    sprintModifier: 0.75

# M381 CHARYBDIS 280mm Slug (Damaged, 75%)
- type: entity
  parent: CartridgeCharon280mmSlug
  id: CartridgeCharon280mmSlugDamaged75
  name: M381 CHARYBDIS 280mm 26.5kg slug
  description: >-
    A damaged 280mm slug with compromised mass distribution and reduced penetrative effect.
    Estimated combat effectiveness: 75%.
  suffix: Slug, Damaged 75%
  components:
  - type: CartridgeAmmo
    proto: BulletCharon280mmSlugDamaged75
    deleteOnSpawn: true
  - type: DamageOnLand
    ignoreResistances: true
    damage:
      types:
        Blunt: 0
  - type: StaticPrice
    price: 1500

# M381 CHARYBDIS 280mm 40KG Subnuclear Slug
# A subnuclear warhead. Detonates on impact with a catastrophic area-of-effect blast.
- type: entity
  parent: BaseCharon280mmCartridge
  id: CartridgeCharon280mmSubnuclear
  name: M381 CHARYBDIS 280mm 40kg subnuclear slug
  description: >-
    A 40 kilogram subnuclear warhead packaged as a railgun slug for the M321-CHARYBDIS 'Thanatos' system.
    Detonates on first contact, producing a massive subnuclear detonation with significant residual radiation.
    RESTRICTED to authorized combat operations only. Requires manual chamber loading.
  suffix: Subnuclear
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          CartridgeCharon280mmSubnuclearDamaged75:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: CartridgeAmmo
    proto: BulletCharon280mmSubnuclear
    deleteOnSpawn: true
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/ArtilleryAmmo/charon_ammo.rsi # Sunrise-Edit
    layers:
    - state: subnuclear
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: subnuclear
    suffix: false
  - type: StaticPrice
    price: 8000
  - type: HeldSpeedModifier
    walkModifier: 0.6
    sprintModifier: 0.6

