# BaseHealingItem

- type: entity
  parent: BaseHealingItem
  id: BaseStarlightHealingItem
  abstract: true
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/medical.rsi
  - type: Item
    size: Small
    sprite: _Starlight/Objects/Specific/Medical/medical.rsi
    heldPrefix: ointment

- type: entity
  id: Bluebrutepack1
  parent: Brutepack
  name: blue bruise pack
  description: A therapeutic gel pack and bandages designed to treat blunt-force trauma.
  suffix: Single
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Medical/medical.rsi
    state: bluebrutepack
    layers:
    - state: bluebrutepack
      map: ["base"]
  - type: Item
    sprite: _Starlight/Objects/Specific/Medical/medical.rsi
    heldPrefix: bluebrutepack
  - type: Stack
    stackType: Bluebrutepack
    count: 1
    baseLayer: base
    layerStates:
    - bluebrutepack
    - bluebrutepack2
    - bluebrutepack3
    layerFunction: Threshold
  - type: StackLayerThreshold
    thresholds:
    - 10
    - 20
  - type: Appearance

- type: entity
  id: Bluebrutepack10
  parent: Bluebrutepack1
  suffix: 10
  components:
  - type: Sprite
    state: bluebrutepack2
  - type: Stack
    stackType: Bluebrutepack
    count: 10

- type: entity
  id: Bluebrutepack20
  parent: Bluebrutepack1
  suffix: Full
  components:
  - type: Sprite
    state: bluebrutepack3
  - type: Stack
    stackType: Bluebrutepack
    count: 20

- type: stack
  id: Bluebrutepack
  name: stack-bluebrutepack
  icon: { sprite: "/Textures/_Starlight/Objects/Specific/Medical/medical.rsi", state: bluebrutepack }
  spawn: Bluebrutepack1
  maxCount: 20

- type: entity
  id: Blueointment1
  parent: Ointment
  name: blue ointment
  description: Uses a special blend of dermaline, aloe, and insuzine to treat frostbite and electrical burns. Does nothing for caustic.
  suffix: Single
  components:
  - type: Sprite
    scale: 1.10,1.05
    sprite: _Starlight/Objects/Specific/Medical/medical.rsi
    state: blueointment
    layers:
    - state: blueointment
      map: ["base"]
  - type: Item
    sprite: _Starlight/Objects/Specific/Medical/medical.rsi
    heldPrefix: blueointment
    storedSprite:
      state: blueointment
      sprite: _Starlight/Objects/Specific/Medical/medical.rsi
  - type: Stack
    stackType: Blueointment
    count: 1
    baseLayer: base
    layerStates:
    - blueointment
    - blueointment2
    - blueointment3
    layerFunction: Threshold
  - type: StackLayerThreshold
    thresholds:
    - 10
    - 20
  - type: Appearance
  - type: Healing
    damageContainers:
    - Biological
    delay: 1.6
    damage:
      types:
        Heat: -5
        Cold: -6
        Shock: -8
    healingBeginSound:
      path: "/Audio/Items/Medical/ointment_begin.ogg"
    healingEndSound:
      path: "/Audio/Items/Medical/ointment_end.ogg"

- type: entity
  id: Blueointment10
  parent: Blueointment1
  suffix: 10
  components:
  - type: Sprite
    state: blueointment2
  - type: Item
    storedSprite:
      state: blueointment2
      sprite: _Starlight/Objects/Specific/Medical/medical.rsi
  - type: Stack
    stackType: Blueointment
    count: 10

- type: entity
  id: Blueointment20
  parent: Blueointment1
  suffix: Full
