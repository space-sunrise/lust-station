# Janitor borg
- type: borgType
  id: janitor

  # Sunrise-Start
  job: JanitorBorg
  # Sunrise-End

  # Description
  dummyPrototype: BorgChassisJanitor

  # Functional
  extraModuleCount: 4
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleJanitor

  defaultModules:
  - BorgModuleStandart
  - BorgModuleCleaning
  - BorgModuleCustodial

  radioChannels:
  - Science
  - Service

  # Sunrise-Start
  footstepCollection:
    collection: FootstepCyborgSpider # Lust-Edit
    params:
      volume: -5
  # Sunrise-Start

  # Visual
  inventoryTemplateId: borgShort
  spriteBodyState: janitor
#  spriteBodyMovementState: janitor_moving # Lust-Edit
  spriteHasMindState: janitor_e
  spriteNoMindState: janitor_e_r
  spriteToggleLightState: janitor_l
  # Lust-start
  spriteRestingState: janitor_rest
  spriteWreckState: janitor_wreck
  # Lust-end

  # Pet
  petSuccessString: petting-success-janitor-cyborg
  petFailureString: petting-failure-janitor-cyborg
  addComponents:
  - type: FootprintAreaCleaner
  - type: Absorbent
    pickupAmount: 500
  - type: SolutionContainerManager
    solutions:
      absorbed:
        maxVol: 500
  - type: Spillable
    solution: absorbed
  - type: RefillableSolution
    solution: absorbed
  # Lust-start
  - type: ActionGrant
    actions:
    - RestActionJanitor
  # Lust-end


# Medical borg
- type: borgType
  id: medical

  # Sunrise-Start
  job: MedicalBorg
  # Sunrise-End

  # Description
  dummyPrototype: BorgChassisMedical

  # Functional
  extraModuleCount: 5
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleMedical

  defaultModules:
  - BorgModuleChemical
  - BorgModuleTopicals
  - BorgModuleRescue

  radioChannels:
  - Science
  - Medical

  addComponents:
  - type: SolutionScanner
  - type: ShowHealthBars
    damageContainers:
    - Biological
  - type: ShowHealthIcons
    damageContainers:
    - Biological
  # Sunrise-Start
  - type: TTS
    voice: TurretFloor
  - type: MovementSpeedModifier
    baseWalkSpeed : 3
    baseSprintSpeed : 5
  - type: FabricateCandy
  - type: InnateItem
    instantActions:
    - HandheldStationMapUnpowered
    - HandheldEmergencyCrewMonitorBorg
    entityTargetActions:
    - HandheldHealthAnalyzerUnpowered
  # Lust-start
  - type: ActionGrant
    actions:
    - RestActionMedical
  # Lust-end
    - HandheldHealthAnalyzer
  # Sunrise-End

  # Visual
  inventoryTemplateId: borgDutch
  spriteBodyState: medical
#  spriteBodyMovementState: medical_moving # Lust-Edit
  spriteHasMindState: medical_e
  spriteNoMindState: medical_e_r
  spriteToggleLightState: medical_l
  # Lust-start
  spriteRestingState: medical_rest
  spriteWreckState: medical_wreck
  # Lust-end

  # Pet
  petSuccessString: petting-success-medical-cyborg
  petFailureString: petting-failure-medical-cyborg

  # Sounds
  footstepCollection:
    collection: FootstepHoverBorg


