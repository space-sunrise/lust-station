# Generic borg
- type: borgType
  id: generic

  # Sunrise-Start
  job: Borg
  # Sunrise-End

  # Description
  dummyPrototype: BorgChassisGeneric

  # Functional
  extraModuleCount: 5
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleScience #until sciborgs are added

  defaultModules:
  - BorgModuleTool
  - BorgModuleInflatable
  - BorgModuleArtifact
  - BorgModuleAnomaly
  - BorgModuleRobotics # Sunrise-Edit

  radioChannels:
  - Science

  # Sunrise-Start
  footstepCollection:
    collection: FootstepCyborgSpider
    params:
      volume: -15
  # Sunrise-End

  # Visual
  inventoryTemplateId: borgShort
  spriteBodyState: robot
  spriteHasMindState: robot_e
  spriteNoMindState: robot_e_r
  spriteToggleLightState: robot_l
  # Lust-start
  spriteRestingState: robot_rest
  spriteWreckState: robot_wreck
  # Lust-end

  # Pet
  petSuccessString: petting-success-generic-cyborg
  petFailureString: petting-failure-generic-cyborg
  # Lust-start
  addComponents:
  - type: ActionGrant
    actions:
    - RestActionRobot
  # Lust-end


# Engineering borg
- type: borgType
  id: engineering

  # Sunrise-Start
  job: EngineerBorg
  # Sunrise-End

  # Description
  dummyPrototype: BorgChassisEngineer

  # Functional
  extraModuleCount: 5
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleEngineering

  defaultModules:
  - BorgModuleStandart
  - BorgModuleAdvancedTool
  - BorgModuleCable
  - BorgModuleConstruction
  - BorgModuleRCD

  radioChannels:
  - Engineering
  - Science

  # Sunrise-Start
  footstepCollection:
    collection: FootstepCyborgSpider
    params:
      volume: -15
  addComponents:
  - type: ShowHealthBars
    damageContainers:
    - Inorganic
    - Silicon
    - Mech
  - type: InnateItem
    instantActions:
    - HandheldStationMapUnpowered
    - EngiAlertsMonitor
  # Lust-start
  - type: ActionGrant
    actions:
    - RestActionEngineer
  # Lust-end
  # Sunrise-End

  # Visual
  inventoryTemplateId: borgShort
  spriteBodyState: engineer
  spriteHasMindState: engineer_e
  spriteNoMindState: engineer_e_r
  spriteToggleLightState: engineer_l
  # Lust-start
  spriteRestingState: engineer_rest
  spriteWreckState: engineer_wreck
  # Lust-end

  # Pet
  petSuccessString: petting-success-engineer-cyborg
  petFailureString: petting-failure-engineer-cyborg


