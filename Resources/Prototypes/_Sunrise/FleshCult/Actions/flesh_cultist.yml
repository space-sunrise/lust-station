- type: entity
  parent: BaseAction
  id: FleshCultistShop
  name: Evolution Shop
  description: Here you can buy active abilities and passive upgrades.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistShop.png
    checkCanInteract: false
  - type: InstantAction
    event: !type:FleshCultistShopActionEvent

- type: entity
  parent: BaseAction
  id: FleshCultistBlade
  name: Flesh Blade
  description: Transforms your active hand into a deadly blade of flesh and bone.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistBlade.png
    itemIconStyle: NoItem
    useDelay: 3
    checkCanInteract: false
  - type: InstantAction
    event: !type:FleshCultistHandTransformEvent
      prototype: FleshBlade

- type: entity
  parent: BaseAction
  id: FleshCultistAdrenalin
  name: Epinephrine Synthesis
  description: The parasite synthesizes and injects epinephrine, increasing speed and stun resistance.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistAdrenalin.png
    itemIconStyle: NoItem
    useDelay: 60
    checkCanInteract: false
  - type: InstantAction
    event: !type:FleshCultistAdrenalinActionEvent

- type: entity
  parent: BaseAction
  id: FleshCultistCreateFleshHeart
  name: Create Flesh Heart
  description: Creates a flesh heart in front of you. Activating it is your primary objective.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistFleshHeart.png
    itemIconStyle: NoItem
    useDelay: 360
  - type: InstantAction
    event: !type:FleshCultistCreateFleshHeartActionEvent

- type: entity
  parent: BaseAction
  id: FleshCultistClaw
  name: Flesh Claw
  description: Transforms your active hand into a functional claw of flesh and bone.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistClaw.png
    itemIconStyle: NoItem
    useDelay: 3
    checkCanInteract: false
  - type: InstantAction
    event: !type:FleshCultistHandTransformEvent
      prototype: FleshClaw

- type: entity
  parent: BaseAction
  id: FleshCultistThrowHugger
  name: Throw Facehugger
  description: Create and throw a flesh facehugger at your enemies.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshThrowHugger.png
    itemIconStyle: NoItem
    useDelay: 60
    checkCanInteract: false
  - type: TargetAction
    range: 200
  - type: WorldTargetAction
    event: !type:FleshCultistThrowHuggerActionEvent

- type: entity
  parent: BaseAction
  id: FleshCultistAcidSpit
  name: Acid Spit
  description: Spit acid at your enemies.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshAcidSpit.png
    itemIconStyle: NoItem
    useDelay: 30
    checkCanInteract: false
  - type: TargetAction
    range: 200
  - type: WorldTargetAction
    event: !type:FleshCultistAcidSpitActionEvent

- type: entity
  parent: BaseAction
  id: FleshCultistFist
  name: Flesh Fist
  description: Transforms your active hand into a massive flesh fist that can break structures.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistFist.png
    itemIconStyle: NoItem
    useDelay: 3
    checkCanInteract: false
  - type: InstantAction
    event: !type:FleshCultistHandTransformEvent
      prototype: FleshFist

- type: entity
  parent: BaseAction
  id: FleshCultistSpikeGun
  name: Spike Gun Arm
  description: Transforms your active hand into a deadly flesh spike gun.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistSpikeGun.png
    itemIconStyle: NoItem
    useDelay: 3
    checkCanInteract: false
  - type: InstantAction
    event: !type:FleshCultistHandTransformEvent
      prototype: FleshSpikeHandGun

- type: entity
  parent: BaseAction
  id: FleshCultistArmor
  name: Flesh Armor
  description: Encases you in armor of flesh and bone.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistArmor.png
    itemIconStyle: NoItem
    useDelay: 10
    checkCanInteract: false
  - type: InstantAction
    event: !type:FleshCultistBodyTransformEvent
      prototype: ClothingOuterArmorFlesh
      targetSlot: outerClothing
      checkSlots:
      - shoes

- type: entity
  parent: BaseAction
  id: FleshCultistHeavyArmor
  name: Heavy Flesh Armor
  description: Encases you in heavy armor of flesh and bone.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistHeavyArmor.png
    itemIconStyle: NoItem
    useDelay: 10
    checkCanInteract: false
  - type: InstantAction
    event: !type:FleshCultistBodyTransformEvent
      prototype: ClothingOuterHeavyArmorFlesh
      targetSlot: outerClothing
      checkSlots:
      - shoes

- type: entity
  parent: BaseAction
  id: FleshCultistSpiderlegs
  name: Spider Form
  description: Transforms part of your body into a spider form, granting speed and some protection.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistSpiderLegs.png
    itemIconStyle: NoItem
    useDelay: 10
    checkCanInteract: false
  - type: InstantAction
    event: !type:FleshCultistBodyTransformEvent
      prototype: ClothingFleshSpiderLegs
      targetSlot: shoes
      checkSlots:
      - outerClothing
      checkTags:
      - FullBodyOuter

- type: entity
  parent: BaseAction
  id: FleshCultistAbsorbBloodPool
  name: Absorb Blood Pool
  description: Allows you to absorb blood pools to heal.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistAbsorbBloodPool.png
    useDelay: 5
    checkCanInteract: false
  - type: InstantAction
    event: !type:FleshCultistAbsorbBloodPoolActionEvent

- type: entity
  parent: BaseAction
  id: FleshCultistDevour
  name: Devour Corpse
  description: Devour a flesh creature to gain evolution points and heal wounds.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: _Sunrise/FleshCult/Interface/Actions/fleshCultistDevour.png
    itemIconStyle: NoItem
    checkCanInteract: false
    useDelay: 5
  - type: TargetAction
    range: 2
    checkCanAccess: true
  - type: EntityTargetAction
    whitelist:
      components:
      - MobState
    event: !type:FleshCultistDevourActionEvent
