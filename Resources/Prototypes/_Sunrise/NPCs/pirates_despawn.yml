# For Expedition NPC
- type: entity
  abstract: true
  id: MobPirateTimedDespawn
  components:
  - type: TimedDespawn
    lifetime: 1200 # 20 minutes
  - type: GhostRole
    name: ghost-role-information-expedition-pirate-name
    description: ghost-role-information-expedition-pirate-description
    rules: ghost-role-information-rules-expedition-pirate-antagonist
    raffle:
      settings: short


