# For Expedition NPC
- type: entity
  name: pirate T1 spawner
  id: MobPirateT1ExpeditionSpawner
  parent: MarkerBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: red
    - state: one
    - sprite: Objects/Misc/Handy_Flags/pirate_handy_flag.rsi
      state: icon
  - type: RandomSpawner
    prototypes:
      - MobPirateT1Knife
      - MobPirateT1KnifeTearGas
      - MobPirateT1KnifeStinger
      - MobPirateT1KnifeFirebomb
      - MobPirateT1KnifeBola
      - MobPirateT1KnifeEMP
      - MobPirateT1MonkeyKnuckleDusters
      - MobPirateT1Pickaxe
      - MobPirateT1Pistol
      - MobPirateT1Medic
      - MobPirateT1Mosin
      - MobPirateT1PKA
      - MobPirateT1MonkeyFlareGun
      - MobPirateT1MonkeyFlareGunCoin
      - MobPirateT1MonkeyFlareGunIncendiary
      - MobPirateT1MonkeyFlareGunUranium
      - MobPirateT1ScrapSMG
      - MobPirateT1SMG
      - MobPirateT1Flintlock
    rarePrototypes:
      - PirateSquadT1LMG
      - PirateSquadT1Breach
      - PirateSquadT1Assault
      - PirateSquadT1Heavy
      - PirateSquadT1Infiltrator
      - PirateSquadT1Monkey
      - MobPirateT1MonkeyFireBomb
      - MobPirateT1MonkeyEDagger
      - MobPirateT1Hunter
      - MobPirateT1HunterSmash
      - MobPirateT1BombardierFire
      - MobPirateT1BombardierGlass
      - MobPirateT1BombardierPipe
      - MobPirateT1ECutlass
      - MobPirateT1EPickaxe
      - MobPirateT1PlasmaCutter
      - MobPirateT1ScrapRifle
      - MobPirateT1Rifle
      - MobPirateT1LCG
      - MobPirateT1BorgAssault
      - MobPirateT1BorgMining
      - MobPirateT1BorgDerelict
    rareChance: 0.2

