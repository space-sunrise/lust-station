# region T1 squad
- type: entityTable
  id: PirateT1LMGSquadTable
  table: !type:AllSelector
    children:
    # Commander
    - !type:EntSelector
      id: MobPirateT1Rifle
      prob: 1
    # Rifle line
    - !type:EntSelector
      id: MobPirateT1ScrapRifle
      prob: 1
    - !type:EntSelector
      id: MobPirateT1ScrapRifle
      prob: 1
    # Support
    - !type:EntSelector
      id: MobPirateT1Medic
      prob: 1
    # LMG gunner
    - !type:EntSelector
      id: MobPirateT1LCG
      prob: 1

- type: entity
  name: pirate T1 LMG squad spawner
  id: PirateSquadT1LMG
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - state: one
    - sprite: _Sunrise/Objects/Weapons/Guns/LMGs/light_chaingun/big.rsi
      state: base
    - sprite: _Sunrise/Objects/Weapons/Guns/LMGs/light_chaingun/big.rsi
      state: mag-0
  - type: EntityTableSpawner
    offset: 1
    table: !type:NestedSelector
      tableId: PirateT1LMGSquadTable
    # Spread squad members so they don't stack in one tile.
    deleteSpawnerAfterSpawn: true

