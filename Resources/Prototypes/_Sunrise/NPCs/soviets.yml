# Base
- type: entity
  abstract: true
  parent:
  - MobNonHumanHostileBase
  - MobHumanoidInvetorySimplified
  - MobPassiveRegen
  name: comrade
  id: MobSovietBase
  categories: [ Spawner ]
  components:
  - type: Climbing
  # Allows ghosts/admins to quickly warp to soviets from the ghost teleport panel
  - type: GhostPanelAntagonistMarker
    name: ghost-panel-antagonist-soviet-name
    description: ghost-panel-antagonist-soviet-description
    priority: 45
  - type: GuideHelp
    guides:
    - MobsExpeditionGuideSoviets
  - type: Damageable
    damageModifierSet: MobPirateT1
  - type: NpcFactionMember
    factions:
    - Soviet
  - type: NpcVeteranFollower
  - type: FootprintEmitter
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      130: Dead
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: RemoveComponentsOnTrigger
    triggerOnce: true
    components:
    - type: Flammable
      damage:
        types:
          Heat: 1.5
    - type: Reflect
  - type: AddComponentsOnTrigger
    triggerOnce: true
    removeExisting: true
    components:
    - type: TimedDespawn
      lifetime: 180
    - type: Strippable
    - type: Pullable
  - type: TimedRemoveComponents
    removeAfter: 0
    components:
    - type: Pullable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageGroupTrigger
        damageGroup: Brute
        damage: 300
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          OrganLootSpawner:
            min: 1
            max: 1
      - !type:GibBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 600
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          Ash:
            min: 1
            max: 1
      - !type:BurnBodyBehavior { }
      - !type:PlaySoundBehavior
        sound:
          collection: MeatLaserImpact
    - trigger:
        !type:DamageTypeTrigger
        damageType: Radiation
        damage: 15
      behaviors:
      - !type:PopupBehavior
        popup: mouth-taste-metal
        popupType: LargeCaution
        targetOnly: true
    - trigger:
        !type:DamageTypeTrigger
        damageType: Radiation
        damage: 75
      behaviors:
      - !type:VomitBehavior
  - type: PassiveDamage
    allowedStates:
    - Alive
    - Critical
    damageCap: 125
  - type: Stamina
    baseCritThreshold: 125
  - type: DamageStateVisuals
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 2
    rechargeSound:
      path: /Audio/_Sunrise/Effects/silence.ogg
  - type: Tool
    speedModifier: 10
    qualities:
    - Prying
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 10
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
       type: StrippableBoundUserInterface
  - type: ToggleableNightVision
    effect: EffectNightVisionPirate
  - type: ComplexInteraction
  - type: TTS
    voice: Sidorovich
  - type: Vocal
    sounds:
      Male: MaleHuman
      Female: FemaleHuman
      Unsexed: MaleHuman
  - type: GhostRole
    prob: 0.05
    makeSentient: true
    name: ghost-role-information-expedition-soviet-name
    description: ghost-role-information-expedition-soviet-description
    rules: ghost-role-information-expedition-soviet-rules
    raffle:
      settings: short
  - type: GhostTakeoverAvailable
  - type: GhostOnMove
    mustBeDead: true
  - type: Puller
    needsHands: false
  - type: Speech
  - type: DatasetVocalizer
    dataset: SovietChatterNPC
    minVocalizeInterval: 45s
    maxVocalizeInterval: 120s
    hideChat: true

# T1 Soldier features
- type: entity
  abstract: true
  name: Private
  id: SovietSoldierBase
  description: Low-ranking soldiers armed with a variety of surplus weapons.
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - sprite: _Sunrise/Mobs/Species/Templates/human.rsi
      state: human
    - sprite: _Sunrise/Clothing/Uniforms/Jumpsuit/sovietuniform.rsi
      state: equipped-INNERCLOTHING
    - sprite: _Starlight/Objects/Clothing/OuterClothing/Armor/sovietflak.rsi
      state: equipped-OUTERCLOTHING
    - sprite: Clothing/Mask/merc.rsi
      state: equipped-MASK
    - sprite: Clothing/Head/Helmets/merc_helmet.rsi
      state: equipped-HELMET
    - sprite: Clothing/Hands/Gloves/mercfingerless.rsi
      state: equipped-HAND
