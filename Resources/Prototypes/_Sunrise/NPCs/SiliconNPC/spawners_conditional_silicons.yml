- type: entity
  name: viscerator unit spawner
  suffix: AI, Hostile
  id: SpawnMobViscerator
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: red
      - state: ai
      - sprite: _Sunrise/Mobs/RogueSilicons/viscerator.rsi
        state: base
      - sprite: _Sunrise/Mobs/RogueSilicons/viscerator.rsi
        state: base_lights
  - type: ConditionalSpawner
    prototypes:
    - MobRogueSiliconT1Viscerator

- type: entityTable
  id: RogueSiliconVisceratorSquadTable
  table: !type:AllSelector
    children:
    - !type:EntSelector
      id: MobRogueSiliconT1Viscerator
      prob: 1
    - !type:EntSelector
      id: MobRogueSiliconT1Viscerator
      prob: 1
    - !type:EntSelector
      id: MobRogueSiliconT1Viscerator
      prob: 1
    - !type:EntSelector
      id: MobRogueSiliconT1Viscerator
      prob: 1
    - !type:EntSelector
      id: MobRogueSiliconT1Viscerator
      prob: 0.5
    - !type:EntSelector
      id: MobRogueSiliconT1Viscerator
      prob: 0.5
    - !type:EntSelector
      id: MobRogueSiliconT1Viscerator
      prob: 0.5
    - !type:EntSelector
      id: MobRogueSiliconT1Viscerator
      prob: 0.5

- type: entity
  name: viscerator squad spawner
  suffix: AI, Hostile, 4-8
  id: SpawnMobRogueSiliconT1VisceratorSquad
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: red
      - state: one
      - sprite: _Sunrise/Mobs/RogueSilicons/viscerator.rsi
        state: base
      - sprite: _Sunrise/Mobs/RogueSilicons/viscerator.rsi
        state: base_lights
  - type: EntityTableSpawner
    offset: 1
    table: !type:NestedSelector
      tableId: RogueSiliconVisceratorSquadTable
    deleteSpawnerAfterSpawn: true

