# BASE
#region AI packages
- type: entity
  id: MobRogueSiliconAISimpleMelee
  abstract: true
  components:
  - type: HTN
    rootTask:
       task: SimpleHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
      SoundTargetInLOS: !type:SoundPathSpecifier
        path: /Audio/Effects/double_beep.ogg

- type: entity
  id: MobRogueSiliconAISimpleRanged
  abstract: true
  components:
  - type: HTN
    rootTask:
       task: SimpleRangedHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
      SoundTargetInLOS: !type:SoundPathSpecifier
        path: /Audio/Effects/double_beep.ogg

#region Mob base
- type: entity
  name: hivemind unit
  abstract: true
  parent:
  - MobMovementSpeedModifierRanged
  - MobStaminaBoss # No stunning bots
  - MobNonHumanHostileBase
  - MobHumanoidInvetorySimplified
  - MobRogueSiliconAISimpleRanged
  id: MobRogueSiliconBase
  components:
  - type: Damageable
    damageContainer: Silicon
    damageModifierSet: Metallic
  - type: NpcFactionMember
    factions:
    - SiliconsExpedition
  - type: NameIdentifier
    group: Silicon
  - type: GhostPanelAntagonistMarker
    name: ghost-panel-antagonist-silicon-name
    description: ghost-panel-antagonist-silicon-description
    priority: 45
  - type: Tag
    tags:
    - RogueSiliconHealTarget
  - type: Bloodstream
  - type: Strippable
  - type: Pullable
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: ComplexInteraction
  - type: MobState
    allowedStates:
    - Alive
    - Critical
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      64: Critical
      330: Dead
    stateAlertDict:
      Alive: BorgHealth
      Critical: BorgCrit
      Dead: BorgDead
    showOverlays: false
    allowRevives: true
  - type: SlowOnDamage
    speedModifierThresholds:
      40: 0.7
      52: 0.5
  - type: HealthExaminable
    examinableTypes:
      - Blunt
      - Slash
      - Piercing
      - Heat
      - Shock
    locPrefix: silicon
  - type: Repairable
    doAfterDelay: 10
    allowSelfRepair: true
  - type: BatterySelfRecharger
    autoRechargeRate: 100
  - type: Battery
    maxCharge: 300
    startingCharge: 300
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 1.5
    rechargeSound:
      path: /Audio/_Sunrise/Effects/silence.ogg
  - type: MeleeWeapon
    attackRate: 1.0
    altDisarm: false
    angle: 0
    animation: WeaponArcPunch
    damage:
      types:
        Heat: 4
        Blunt: 6
        Structural: 20
    soundHit:
      collection: MetalThud
  - type: Speech
    speechSounds: SyndieBorg
  - type: Vocal
    sounds:
      Unsexed: UnisexSiliconSyndicate
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepBorg
  - type: SpamEmitSound
    minInterval: 10
    maxInterval: 60
    sound:
      collection: RobotBeeps
      params:
        variation: 0.125
  - type: SoundWhileAlive
  - type: ToggleableNightVision
    effect: EffectNightVisionSyndie
  - type: TTS
    voice: Sentrybot
  - type: NpcVeteranFollower

- type: entity
  parent:
  - MobMovementSpeedModifierMelee
  - MobRogueSiliconBase
  id: MobRogueSiliconScrapBase
  name: scrap unit
  description: These bots come in various shapes and forms, reflecting a wide range of designs and purposes. Many seem to be put together using locally available materials, leading to their disparate appearances. Notably, some units are equipped with thrusters and embedded laser weapons.
  abstract: true
  components:
  - type: Loadout
    prototypes:
    - MobRogueSiliconLootT1
  - type: Sprite
    drawdepth: Mobs
    sprite: _Sunrise/Mobs/RogueSilicons/robots.rsi
    layers:
    - state: body_generic
      map: [ "body" ]
    - state: head_generic
      map: [ "head" ]
    - state: head_generic_eye
      map: [ "eyes" ]
      color: "#990000"
      shader: unshaded
    - state: l_arm_generic
      map: [ "leftArm" ]
    - state: r_arm_generic
      map: [ "rightArm" ]
    - state: l_leg_generic
      map: [ "leftLeg" ]
    - state: r_leg_generic
      map: [ "rightLeg" ]
    - state: mask_null
      map: [ "decor" ]
    - state: mask_null
      map: [ "overlay" ]
    - state: mask_null
      map: [ "overlayUnshaded" ]
      shader: unshaded
  - type: DamageStateVisuals
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: MobThresholds
    thresholds:
      0: Alive
      48: Critical
      300: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      30: 0.7
      40: 0.5

- type: entity
  id: MobRogueSiliconProjectileBatteryAmmo
  abstract: true
  components:
  - type: BatteryAmmoProvider
    proto: BulletLaser
    fireCost: 100

- type: entity
  id: MobRogueSiliconHitscanBatteryAmmo
  abstract: true
  components:
  - type: BatteryAmmoProvider
    proto: RedLightLaser
    fireCost: 100

- type: entity
  id: MobRogueSiliconPassiveRegen
  abstract: true
  components:
  - type: PassiveDamage
    allowedStates:
    - Alive
    - Critical
    damageCap: 500
    damage:
      groups:
        Brute: -0.6
        Burn: -0.6
        Airloss: -1

- type: entity
  parent:
  - MobRogueSiliconBase
  id: MobRogueSiliconDroneBase
  name: drone
  description: Hacked and reprogrammed by a rogue AI departmental drones.
  abstract: true
  components:
  - type: Loadout
    prototypes:
    - MobRogueSiliconLootT1
  - type: CanMoveInAir
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.25
        density: 100
        mask:
          - FlyingMobMask
        layer:
          - FlyingMobLayer
  - type: DamageStateVisuals
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: Bloodstream
  - type: MobThresholds
    thresholds:
      0: Alive
      24: Critical
      216: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      14: 0.7
      20: 0.5
  - type: Gun
    showExamineText: false
    fireRate: 0.75
    minAngle: 5
    maxAngle: 15
    angleIncrease: 2
    angleDecay: 3
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser.ogg
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/_Sunrise/Effects/silence.ogg
  - type: SoundWhileAlive
  - type: AmbientSound
    volume: -6
    range: 5
    sound: /Audio/Effects/shuttle_thruster.ogg

