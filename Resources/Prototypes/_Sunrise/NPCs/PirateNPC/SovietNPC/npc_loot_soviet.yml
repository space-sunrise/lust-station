  name: ussp bundle
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Sunrise/Clothing/Belt/lightsovietwebbing.rsi
    state: icon
  - type: Clothing
    sprite: _Sunrise/Clothing/Belt/lightsovietwebbing.rsi

- type: entity
  parent: MercenaryDuffelGiftBox
  id: SovietMessengerGiftBox
  name: soviet gear bundle
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Sunrise/Clothing/Back/Messenger/color.rsi
    layers:
    - state: icon-base
      color: "#6a6a36"
    - state: icon-sling
      color: "#6a6a36"
    - state: icon-clasp
      color: "#bbbb7a"
  - type: Clothing
    sprite: _Sunrise/Clothing/Back/Messenger/color.rsi
    clothingVisuals:
      back:
      - state: base-equipped-BACKPACK
        color: "#6a6a36"
      - state: sling-equipped-BACKPACK
        color: "#6a6a36"
      - state: clasp-equipped-BACKPACK
        color: "#bbbb7a"
  - type: Item
    inhandVisuals:
      left:
      - state: base-inhand-left
        color: "#6a6a36"
      - state: clasp-inhand-left
        color: "#bbbb7a"
      right:
      - state: base-inhand-right
        color: "#6a6a36"
      - state: clasp-inhand-right
        color: "#bbbb7a"

