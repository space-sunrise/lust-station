# region Loot Spawners
- type: entity
  parent: ClothingOuterArmorSovietPlate
  id: SovietSoldierPoolLootSpawner
  name: soviet soldier loot spawner
  components:
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: SoldierTable01
    offset: 0
    deleteSpawnerAfterSpawn: true

- type: entityTable
  id: SoldierTable01
  table: !type:AllSelector
    children:
    - id: ClothingHeadHelmetMerc
      prob: 0.15
    - id: ClothingMaskGasMerc
      prob: 0.15
    - id: ClothingUniformJumpsuitSoviet
      prob: 0.15
    - id: ClothingBackpackMerc
      prob: 0.15
    - id: ClothingBeltLightSovietMarineWebbing
      prob: 0.1
    - id: ClothingOuterArmorSovietPlateRandomSpawner
      prob: 0.1
    - id: ClothingHandsGlovesMercFingerless
      prob: 0.1
    - id: ClothingHandsMercGlovesCombat
      prob: 0.05
    - id: ClothingBackpackMessengerMercenary
      prob: 0.05

- type: entityTable
  id: SovietSmokingTable
  table: !type:AllSelector
    children:
    - id: CigaretteSoviet
      prob: 0.1
    - id: CigPackSoviet
      prob: 0.05
    - id: MysteryLighterBox
      prob: 0.02
    - id: UplinkLighterBox
      prob: 0.02

- type: entity
  id: SovietSmokingSpawner
  name: soviet smoking spawner
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: SovietSmokingTable
    offset: 0
    deleteSpawnerAfterSpawn: true

