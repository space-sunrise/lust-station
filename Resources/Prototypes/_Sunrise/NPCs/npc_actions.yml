# region Soviet
- type: entity
  id: GunSideArmFan
  name: trusty Lucky 45
  description: Shoots bullets.
  categories: [ HideSpawnMenu ]
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 5
    rechargeSound:
      path: /Audio/Weapons/Guns/MagIn/revolver_magin.ogg
  - type: BasicEntityAmmoProvider
    proto: CartridgeMagnumIncendiary
    capacity: 5
    count: 5
  - type: Gun
    minAngle: 3
    maxAngle: 9
    fireRate: 3
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot: /Audio/Weapons/Guns/Gunshots/revolver.ogg
    soundEmpty: null
    projectileSpeed: 20

- type: entity
  id: ActionSideArmFan
  parent: BaseAction
  name: "[color=yellow]Lucky 45[/color]"
  description: "Luck always beats skill, ya weasel. [color=yellow]5 second between ammo recharges.[/color]"
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 5
    icon: { sprite : Objects/Weapons/Guns/Revolvers/python.rsi, state: icon }
    priority: 2
    itemIconStyle: BigAction
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: WorldTargetAction
    event: !type:ActionGunShootEvent
  # endregion
