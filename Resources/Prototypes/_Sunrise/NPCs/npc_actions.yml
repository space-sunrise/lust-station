# region Grenade
- type: entity
  id: GunGrenadeExplosiveShrapnel
  categories: [ HideSpawnMenu ]
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 75
    rechargeSound:
      path: /Audio/_Sunrise/Effects/silence.ogg
  - type: BasicEntityAmmoProvider
    proto: BulletGrenadeExplosiveShrapnel
    capacity: 1
    count: 1
  - type: Gun
    fireRate: 1
    projectileSpeed: 8
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg

- type: entity
  id: ActionGunGrenadeExplosiveShrapnel
  parent: BaseAction
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 75
    checkCanInteract: false
    icon:
      sprite: Objects/Weapons/Grenades/grenade.rsi
      state: icon
    itemIconStyle: NoItem
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: WorldTargetAction
    event: !type:ActionGunShootEvent
  - type: SpeakOnAction
    sentence: action-speech-soviet-grenade

