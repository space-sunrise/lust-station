# Steps where the player attacks an entity.
- type: tutorialStep
  id: BaseTutorialAttackStepBase
  parent: BaseTutorialStepBase
  abstract: true
  chatMessage: tutorial-base-step-attack-chat
  ttsMessage: tutorial-base-step-attack-tts
