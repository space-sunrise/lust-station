- type: entity
  id: SuitStorageBlueShield
  parent: SuitStorageBase
  suffix: BlueShield
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: OxygenTankFilled
        - id: ClothingOuterHardsuitBlueShield
        - id: ClothingMaskGasBlueShield
        - id: ClothingShoesBootsMagSec
  - type: AccessReader
    access: [["BlueShield"]]

#Security hardsuit
- type: entity
  id: SuitStorageSecSunrise
  parent: SuitStorageBase
  suffix: Security, Sunrise
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: OxygenTankFilled
        - id: ClothingOuterHardsuitSecuritySunrise
        - id: ClothingMaskBreath
        - id: ClothingShoesBootsMagSec
          prob: 0.5
  - type: AccessReader
    access: [["Security"]]

#Pirate EVA
- type: entity
  id: SuitStorageEVAPirateSun
  parent: SuitStorageBase
  suffix: Pirate EVA, Sunrise
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:GroupSelector
          children:
          - id: OxygenTankFilled
          - id: DoubleEmergencyOxygenTankFilled
            weight: 0.5
        - !type:GroupSelector
          children:
          - id: NitrogenTankFilled
          - id: DoubleEmergencyNitrogenTankFilled
            weight: 0.5
        - id: ClothingMaskBreath
        - id: ClothingShoesBootsMagPirate
        - id: CombatMedipen
          prob: 0.5
        - id: JetpackMiniFilled
          prob: 0.3
        - !type:GroupSelector
          children:
          - id: ClothingHeadHelmetPirate
          - id: ClothingHeadHelmetPirateAlt
        - !type:GroupSelector
          children:
          - id: ClothingOuterEVASuitPirate
            weight: 0.5
          - id: ClothingOuterEVASuitPirateArmored
            weight: 0.45
          - id: ClothingOuterEVASuitPirateArmoredAlt
            weight: 0.3

