- type: entity
  id: CrateServiceCopyMachine
  parent: CrateGenericSteel
  name: printer machine crate
  description:
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: Screwdriver
        - id: CopyMachineFlatpack

- type: entity
  id: CrateServiceCopyMachineRestock
