- type: entity
  parent: CrateGeneric
  id: CrateAmmunitionSmall
  name: old small ammunition crate
  components:
  - type: EntityStorage
    whitelist:
      components:
      - BallisticAmmoProvider
      - CartridgeAmmo
  - type: MultiHandedItem
  - type: Item
    size: Ginormous
    sprite: _Sunrise/Structures/Storage/Crates/woodcrate_ussp_small.rsi
  - type: Sprite
    sprite: _Sunrise/Structures/Storage/Crates/woodcrate_ussp_small.rsi
    layers:
    - state: base
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
    - state: paper
      sprite: Structures/Storage/Crates/labels.rsi
      offset: "-0.46875,0.03125"
      map: ["enum.PaperLabelVisuals.Layer"]
  - type: Icon
    sprite: _Sunrise/Structures/Storage/Crates/woodcrate_ussp_small.rsi
    state: base
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.15,0.2,0.19"
        density: 300
        mask:
        - CrateMask #this is so they can go under plastic flaps
        layer:
        - MachineLayer
  - type: StaticPrice
    price: 75

