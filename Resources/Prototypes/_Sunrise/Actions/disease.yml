- type: entity
  parent: BaseAction
  id: ActionInfect
  name: Infect
  description: Attempt to infect a target. Uses charges.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 1
    itemIconStyle: BigAction
    icon:
      sprite: _Sunrise/Actions/disease.rsi
      state: action
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    whitelist:
      components:
      - HumanoidAppearance
    canTargetSelf: false
    event: !type:InfectEvent

- type: entity
  parent: BaseAction
  id: ActionDiseaseShop
  name: Disease Shop
  description: Open the disease mutation menu.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon:
      sprite: _Sunrise/Actions/disease.rsi
      state: shop
  - type: InstantAction
    event: !type:DiseaseShopActionEvent











