- type: entity
  id: Jump
  categories: [ HideSpawnMenu ]
  name: Jump
  description: Lets you perform a powerful jump in the selected direction.
  components:
  - type: Action
    useDelay: 20
    icon:
      sprite: _Sunrise/Actions/zombie.rsi
      state: jump
    itemIconStyle: NoItem
  - type: TargetAction
    range: 200
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:JumpActionEvent

- type: entity
  parent: Jump
  id: JumpMoth
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 1
    itemIconStyle: NoItem
    icon:
      sprite: _Sunrise/Actions/resomi.rsi
      state: bird_call
  - type: LimitedCharges
    maxCharges: 3
  - type: AutoRecharge
    rechargeDuration: 30
  - type: WorldTargetAction
    event: !type:JumpActionEvent
