- type: entity
  id: Jump
  categories: [ HideSpawnMenu ]
  name: Jump
  description: Lets you perform a powerful jump in the selected direction.
  components:
  - type: Action
    useDelay: 20
    icon:
      sprite: _Sunrise/Actions/zombie.rsi
      state: jump
    itemIconStyle: NoItem
  - type: TargetAction
    range: 200
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:JumpActionEvent
