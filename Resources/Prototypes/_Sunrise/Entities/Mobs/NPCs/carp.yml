- type: entity
  id: MobCarpHoloDragon
  parent: MobCarpHolo
  suffix: DragonBrood
  components:
    - type: Sprite
      sprite: _Sunrise/Mobs/Aliens/Carps/holo.rsi
    - type: GhostRole
      allowMovement: true
      allowSpeech: true
      makeSentient: true
      name: ghost-role-information-sentient-carpholo-name
      description: ghost-role-information-sentient-carp-description
      rules: ghost-role-information-space-dragon-summoned-carp-rules
      mindRoles:
      - MindRoleGhostRoleTeamAntagonistFlock
    - type: GhostTakeoverAvailable
    - type: HTN
      rootTask:
        task: DragonCarpCompound
    - type: Flammable
      damage:
       types: {}
    - type: Temperature
    - type: TemperatureDamage
      heatDamageThreshold: 1200
    - type: MobThresholds
      thresholds:
        0: Alive
        60: Dead
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 6
          Slash: 6
          Structural: 15
    - type: Tag
      tags:
      - Carp
      - DoorBumpOpener
      - NoPaint
      - CarpRiftHealTarget

- type: entity
  id: MobSharkDragon
  parent: MobShark
  suffix: DragonBrood
  components:
    - type: GhostRole
      allowMovement: true
      allowSpeech: true
      makeSentient: true
      name: ghost-role-information-sentient-carpshark-name
      description: ghost-role-information-sentient-carp-description
      rules: ghost-role-information-space-dragon-summoned-carp-rules
      mindRoles:
      - MindRoleGhostRoleTeamAntagonistFlock
    - type: GhostTakeoverAvailable
    - type: HTN
      rootTask:
        task: DragonCarpCompound
    - type: Flammable
      damage:
       types: {}
    - type: Temperature
    - type: TemperatureDamage
      heatDamageThreshold: 1200
    - type: Sprite
      scale: 0.9, 0.9
      sprite: _Sunrise/Mobs/Aliens/Carps/sharkminnow.rsi
      layers:
      - map: [ "enum.DamageStateVisualLayers.Base" ]
        state: alive
      - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
        state: mouth
        shader: unshaded
    - type: MobThresholds
      thresholds:
        0: Alive
        125: Dead
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 9
          Slash: 9
          Bloodloss: 5
          Structural: 25
    - type: Tag
      tags:
      - Carp
      - DoorBumpOpener
      - NoPaint
      - CarpRiftHealTarget

