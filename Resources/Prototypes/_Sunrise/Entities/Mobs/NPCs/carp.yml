- type: entity
  id: MobCarpHoloDragon
  parent: MobCarpHolo
  suffix: DragonBrood
  components:
    - type: GhostRole
      allowMovement: true
      allowSpeech: true
      makeSentient: true
      name: ghost-role-information-sentient-carpholo-name
      description: ghost-role-information-sentient-carp-description
      rules: ghost-role-information-space-dragon-summoned-carp-rules
      mindRoles:
      - MindRoleGhostRoleTeamAntagonistFlock
    - type: GhostTakeoverAvailable
    - type: HTN
      rootTask:
        task: DragonCarpCompound
    - type: Flammable
      damage:
       types: {}
    - type: Temperature
    - type: TemperatureDamage
      heatDamageThreshold: 1200
    - type: MobThresholds
      thresholds:
        0: Alive
        80: Dead
    - type: MeleeWeapon
      damage:
        types:
          Blunt: 9
          Slash: 9
          Structural: 15
    - type: Tag
      tags:
      - Carp
      - DoorBumpOpener
      - NoPaint
      - CarpRiftHealTarget

- type: entity
  id: MobSharkDragon
  parent: MobShark
  suffix: DragonBrood
  components:
  - type: HTN
    rootTask:
      task: DragonCarpCompound
  - type: GhostRole
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: ghost-role-information-sentient-carpshark-name
    description: ghost-role-information-sentient-carp-description
    rules: ghost-role-information-space-dragon-summoned-carp-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonistFlock
  - type: GhostTakeoverAvailable
  - type: Sprite
    scale: 0.9, 0.9
    sprite: _Sunrise/Mobs/Aliens/Carps/sharkminnow.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: alive
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: mouth
      shader: unshaded
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Dead
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 10
        Slash: 10
        Bloodloss: 5
        Structural: 20
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.20
        density: 100
        mask:
          - FlyingMobMask
        layer:
          - FlyingMobLayer
  - type: Tag
    tags:
    - Carp
    - DoorBumpOpener
    - NoPaint
    - CarpRiftHealTarget
