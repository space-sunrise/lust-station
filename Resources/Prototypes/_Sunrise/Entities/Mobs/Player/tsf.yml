- type: entity
  id: RandomHumanoidSpawnerTSFMarine
  name: Solar Federation Marine
  components:
    - type: Sprite
      sprite: _Sunrise/Markers/jobs.rsi
      state: TSF
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirst
        - NamesMilitaryLast
      nameFormat: name-format-ert
    - type: RandomHumanoidSpawner
      settings: TSFMarine

- type: entity
  parent: RandomHumanoidSpawnerTSFMarine
  id: RandomHumanoidSpawnerTSFMarineLeader
  suffix: Leader
  components:
    - type: Sprite
      sprite: _Sunrise/Markers/jobs.rsi
      state: TSF
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirstLeader
        - NamesMilitaryLast
      nameFormat: name-format-ert
    - type: RandomHumanoidSpawner
      settings: TSFMarineLeader

- type: entity
  parent: RandomHumanoidSpawnerTSFMarine
  id: RandomHumanoidSpawnerTSFMARSOC
  suffix: MARSOC
  components:
    - type: Sprite
      sprite: _Sunrise/Markers/jobs.rsi
      state: TSF
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirstLeader
        - NamesMilitaryLast
      nameFormat: name-format-ert
    - type: RandomHumanoidSpawner
      settings: TSFMarineMARSOC

- type: randomHumanoidSettings
  id: TSFMarine
  parent: EventHumanoidMindShielded
  speciesBlacklist:
  - Diona
  - Vox
  - Felinid
  - Moth
  - Arachnid
  - Reptilian
  - Vulpkanin
  - Swine
  - Tajaran
  - Demon
  - SlimePerson
  - Dwarf
  - HumanoidXeno
  - Predator
  - Resomi
  components:
    - type: GhostRole
      name: ghost-role-information-tsf-marine-name
      description: ghost-role-information-tsf-marine-desc
      rules: ghost-role-information-tsf-aligned-rules
      raffle:
        settings: default
      mindRoles:
      - MindRoleGhostTSFAligned
      job: TSFMarine
    - type: Loadout
      prototypes: [ TSFMarineGear ]
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirst
        - NamesMilitaryLast
      nameFormat: name-format-ert
    - type: AutoImplant
      implants:
      - DeathRattleImplantTSF
      - MindShieldImplant

- type: randomHumanoidSettings
  id: TSFMarineLeader
  parent: TSFMarine
  components:
    - type: GhostRole
      name: ghost-role-information-tsf-leader-name
    - type: Loadout
      prototypes: [ TSFMarineLeaderGear ]
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirstLeader
        - NamesMilitaryLast
      nameFormat: name-format-ert

- type: randomHumanoidSettings
  id: TSFMarineMARSOC
  parent: TSFMarine
  components:
    - type: GhostRole
      name: ghost-role-information-tsf-MARSOC-name
    - type: Loadout
      prototypes: [ TSFEliteMarineGear ]
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirstLeader
        - NamesMilitaryLast
      nameFormat: name-format-ert
    - type: AutoImplant
      implants:
      - DeathRattleImplantTSF
      - DeathAcidifierImplant
      - MindShieldImplant
