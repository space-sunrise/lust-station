- type: entity
  id: SyndieIntellicard
  name: Syndieintellicard
  description: A storage device for AIs but from evil guys!
  parent:
  - BaseItem
  - AiHolder
  suffix: Empty
  components:
  - type: ContainerComp
    proto: AiHeldIntellicard
    container: station_ai_mind_slot
  - type: Sprite
    sprite: _Sunrise/Objects/Devices/ai_card.rsi
    layers:
    - state: base
    - state: empty
      map: ["unshaded"]
      shader: unshaded
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.StationAiVisualLayers.Icon:
        unshaded:
          Empty: { state: empty }
          Occupied: { state: full }
          Rebooting: { state: dead }
          Dead: { state: dead }
  - type: Intellicard
  - type: StaticPrice
    price: 500

