
#CBURN Softsuit
- type: entity
  parent: [ BaseCentcommContraband, ClothingOuterEVASuitBase ]
  id: ClothingOuterSoftsuitCBURN
  name: CBURN insulated EVA suit
  description: A heavyweight, tough and padded EVA capable biosuit used for special cleanup operations.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/OuterClothing/Hardsuits/cburn.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/OuterClothing/Hardsuits/cburn.rsi
    equipSound: /Audio/Mecha/mechmove03.ogg #starlight
    unequipSound: /Audio/Mecha/mechmove03.ogg #starlight
    equipDelay: 3 #starlight
    unequipDelay: 3 #starlight
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: FireProtection
    reduction: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.3
        Piercing: 0.5
        Heat: 0.1
        Cold: 0.1
        Shock: 0.1
        Radiation: 0.1
        Caustic: 0.1
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.1
  - type: ClothingSpeedModifier
    walkModifier: 0.75
    sprintModifier: 0.75
  - type: HeldSpeedModifier
  - type: Tag
    tags:
    - SuitEVA

#Pirate Hardsuit
- type: entity
  parent: [ ClothingOuterEVASuitBase, BaseMajorContraband ]
  id: ClothingOuterEVASuitPirateOld
  name: pirate hardsuit
  suffix: Pirate, Sunrise
  description: An ancient armored hardsuit, perfect for defending against space scurvy and toolbox-wielding scallywags.
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Hardsuits/piratecaptain.rsi
  - type: Clothing
    sprite: Clothing/OuterClothing/Hardsuits/piratecaptain.rsi
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    equipDelay: 1
    unequipDelay: 4
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: FireProtection
    reduction: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.55
        Slash: 0.6
        Piercing: 0.65
        Heat: 0.6
        Radiation: 0.5
        Caustic: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: HeldSpeedModifier
  - type: StaticPrice
    price: 2000
  - type: ContainerContainer
    containers:
      beakerSlot: !type:ContainerSlot
  - type: Inject
    openCloseDelay: 1
    autoClose: true
    autoCloseDelay: 6
  - type: ItemSlots
    slots:
      beakerSlot:
        whitelist:
          tags:
          - FitsHardsuit

#Pirate EVA
- type: entity
