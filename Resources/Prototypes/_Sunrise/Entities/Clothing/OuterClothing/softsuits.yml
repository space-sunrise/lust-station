- type: entity
  parent: ClothingOuterEVASuitPirateArmored
  id: ClothingOuterHardsuitScaf
  name: SCAF EVA suit
  description: A green-and-brown EVA suit used by freelance raiders and guns-for-hire. Offers little against lasers but shrugs off bullets. Made for quick getaways when the job goes sideways.
  components:
  - type: Sprite
    sprite: _Sunrise/Clothing/OuterClothing/Suits/scaf.rsi
  - type: Clothing
    sprite: _Sunrise/Clothing/OuterClothing/Suits/scaf.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.4
        Heat: 0.9
        Caustic: 0.9
  - type: Reflect
    reflectProb: 0.1
    spread: 360
    soundOnReflect: /Audio/_Starlight/Armor/Ricochet/ricochet1_1.ogg
    reflects:
    - NonEnergy
  - type: ExplosionResistance
    damageCoefficient: 0.8
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
