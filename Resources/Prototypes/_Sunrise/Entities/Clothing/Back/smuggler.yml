# Sunrise smuggler bag loot tables.

- type: entityTable
  id: SmugglerSunriseLootTable
  table: !type:AllSelector
    children:
    - id: SmugglerSunriseForgedPartsParcel
    - !type:NestedSelector
      tableId: SmugglerSunriseImprovisedAmmoTable
    - id: SmugglerSunriseMaterialsParcel
    - !type:NestedSelector
      tableId: SmugglerSunriseGrenadesTable

- type: entity
  parent: [ BaseItem, BaseWrappedParcel ]
  id: SmugglerSunriseMaterialsParcel
  name: wrapped materials parcel
  description: A compact parcel with smuggled materials.
  components:
  - type: Sprite
    sprite: Objects/Misc/ParcelWrap/wrapped_parcel.rsi
    state: parcel-medium
  - type: Item
    size: Small
  - type: EntityTableContainerFill
    containers:
      contents: !type:NestedSelector
        tableId: SmugglerSunriseMaterialsTable

- type: entity
  parent: [ BaseItem, BaseWrappedParcel ]
  id: SmugglerSunriseForgedPartsParcel
  name: wrapped forged parts parcel
  description: A compact parcel with forged parts.
  components:
  - type: Sprite
    sprite: Objects/Misc/ParcelWrap/wrapped_parcel.rsi
    state: parcel-medium
  - type: Item
    size: Normal
  - type: EntityTableContainerFill
    containers:
      contents: !type:NestedSelector
        tableId: SmugglerSunriseForgedPartsTable

- type: entityTable
  id: SmugglerSunriseForgedPartsTable
  table: !type:GroupSelector
    children:
    - id: UnfinishedSwordForged
      weight: 2
    - id: UnfinishedClaymoreForged
      weight: 1
    - id: UnfinishedClothingOuterArmorForged
      weight: 2
    - id: UnfinishedClothingHeadHelmetForged
      weight: 2
    - id: UnfinishedPistolForged
      weight: 2
    - id: UnfinishedRevolverForged
      weight: 2
    - id: UnfinishedSubMachineGunForged
      weight: 0.5
    - id: UnfinishedSniperForged
      weight: 0.5
    - id: RadioJammerSyndicate

- type: entityTable
  id: SmugglerSunriseImprovisedAmmoTable
  table: !type:GroupSelector
    children:
    - id: ShellShotgunImprovisedEmpty
      amount: !type:RangeNumberSelector
        range: 1, 3
    - id: ShellShotgunImprovisedIncendiary
      amount: !type:RangeNumberSelector
        range: 1, 4
    - id: ShellShotgunImprovisedUranium
      amount: !type:RangeNumberSelector
        range: 1, 3
    - id: MagazineBoxImprovisedPistol
    - id: MagazineBoxImprovisedRifle
    - id: MagazineBoxImprovisedMagnum
