- type: entity
  parent: ClothingBraBaseButcherable
  id: ClothingBraTshirtWhite
  name: white t-shirt
  description: T-shirt for hot weather.
  components:
  - type: Sprite
    sprite: _Sunrise/Clothing/Bra/T-shirt/color.rsi
    layers:
    - state: icon
      color: "#cfcfcf"
  - type: Clothing
    sprite: _Sunrise/Clothing/Bra/T-shirt/color.rsi
    clothingVisuals:
      bra:
      - state: equipped-BRA
        color: "#cfcfcf"
  - type: Item
    inhandVisuals:
      right:
      - state: inhand-right
        color: "#cfcfcf"
      left:
      - state: inhand-left
        color: "#cfcfcf"

