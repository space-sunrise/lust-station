- type: entity
  name: NVD
  abstract: true
  id: BaseNightVisionDevice
  parent: [BaseItem]
  components:
  - type: Item
    size: Normal
  - type: Sprite
  - type: Clothing
    slots: [ Eyes ]
  - type: Appearance
  - type: UseDelay
    delay: 5.0
  - type: ToggleClothing
    action: NVDToggleAction
    mustEquip: true
    disableOnUnequip: true
  - type: ComponentToggler
    parent: true
    components:
      - type: NightVision
        effect: EffectNightVisionGreen

- type: entity
  name: NVD
  id: ClothingEyesNVD
  parent: [BaseNightVisionDevice, PowerCellSlotSmallItem]
  description: Night vision device. Provides an image of the terrain in low-light conditions.
  components:
  - type: Sprite
    sprite: _Sunrise/Clothing/Eyes/Glasses/nvd.rsi
    layers:
      - state: icon
      - state: icon-flash
        visible: false
        shader: unshaded
        map: [ "light" ]
  - type: Clothing
    sprite: _Sunrise/Clothing/Eyes/Glasses/nvd.rsi
    quickEquip: true
    slots: [ Eyes ]
    clothingVisuals:
      eyes:
      - state: off-equipped-EYES
  - type: PowerCellDraw
    drawRate: 3.5
    useCharge: 20
  - type: ItemToggle
    predictable: false # issues between ToggleCellDraw and ItemToggleActiveSound
    onUse: false
    canActivateInhand: false
    soundActivate:
      path: /Audio/_Sunrise/Items/Goggles/activate.ogg
    soundDeactivate:
      path: /Audio/_Sunrise/Items/Goggles/deactivate.ogg
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
  - type: ToggleableVisuals
    spriteLayer: light
    clothingVisuals:
      eyes:
      - state: on-equipped-EYES
        shader: unshaded
  - type: ToggleCellDraw
  - type: HideLayerClothing
    layers:
      Hair: HEAD
  - type: Tag
    tags:
    - NightVisionDevice

- type: entity
  name: NVD Security
  id: ClothingEyesNVDSec
  suffix: security
  parent: [ClothingEyesNVD, ShowSecurityIcons, BaseSecurityCommandContraband]
  description: Night vision device. Provides an image of the terrain in low-light conditions.
  components:
  - type: Item
  - type: Sprite
    sprite: _Sunrise/Clothing/Eyes/Glasses/nvd.rsi
    layers:
      - state: icon
      - state: icon-unshaded
        shader: unshaded
      - state: icon-flash
        visible: false
        shader: unshaded
        map: [ "light" ]

- type: entity
  name: Med-Security NVD
  id: ClothingEyesNVDMedSec
  suffix: med-security
  parent: [ClothingEyesNVD, ShowSecurityIcons, ShowMedicalIcons, BaseSecurityCommandContraband]
  description: Night vision device. Provides an image of the terrain in low-light conditions.
  components:
  - type: Item
  - type: Sprite
    sprite: _Sunrise/Clothing/Eyes/Glasses/nvd.rsi
    layers:
      - state: icon
      - state: icon-unshaded
        shader: unshaded
      - state: icon-flash
        visible: false
        shader: unshaded
        map: [ "light" ]

- type: entity
  parent: [ClothingEyesNVD, ShowSecurityIcons]
  id: ClothingEyesNVDSyndicate
  suffix: syndicate
  components:
  - type: Sprite
    sprite: _Sunrise/Clothing/Eyes/Glasses/syndie_nvd.rsi
    layers:
      - state: icon
      - state: icon-unshaded
        shader: unshaded
      - state: icon-flash
        visible: false
        shader: unshaded
        map: [ "light" ]
  - type: PowerCellDraw
    drawRate: 2
    useCharge: 10
  - type: ShowSyndicateIcons
  - type: ComponentToggler
    parent: true
    components:
      - type: NightVision
        effect: EffectNightVisionSyndie

- type: entity
  parent: ClothingEyesNVD
  id: ClothingEyesNVDHandcrafted
  suffix: handcrafted
  components:
  - type: Sprite
    sprite: _Sunrise/Clothing/Eyes/Glasses/handcrafted_nvd.rsi
    layers:
      - state: icon
      - state: icon-unshaded
        shader: unshaded
      - state: icon-flash
        visible: false
        shader: unshaded
        map: [ "light" ]
  - type: Clothing
    sprite: _Sunrise/Clothing/Eyes/Glasses/handcrafted_nvd.rsi
    quickEquip: true
    slots: [ HEAD ]
    clothingVisuals:
      head:
      - state: off-equipped-EYES
  - type: ToggleableVisuals
    spriteLayer: light
    clothingVisuals:
      head:
      - state: on-equipped-EYES
        shader: unshaded
  - type: PowerCellDraw
    drawRate: 1.5
    useCharge: 25
  - type: VisionDarkener
    strength: 0.2
  - type: IdentityBlocker
  - type: ComponentToggler
    parent: true
    components:
      - type: NightVision
        effect: EffectNightVisionHandcraft
  - type: Tag
    tags:
    - NVDHandcrafted
  - type: Construction
    graph: handcraftnvd
    node: nvdfinished

- type: entity
  name: improvised NVD
  parent: [BaseItem, PowerCellSlotSmallItem]
  id: NVDHandcraftedParts
  description: An welding mask with atached strange parts and threaded with cabling. It looks incomplete.
  components:
  - type: Sprite
    sprite: _Sunrise/Clothing/Eyes/Glasses/handcrafted_nvd.rsi
    layers:
      - state: icon
  - type: Item
    size: Small
    sprite: _Sunrise/Clothing/Eyes/Glasses/handcrafted_nvd.rsi
  - type: Construction
    graph: handcraftnvd
    node: nvdassembling
