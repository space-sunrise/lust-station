- type: entity
  id: SpawnPointGhostFoliant
  name: ghost role spawn point
  suffix: Foliant
  parent: MarkerBase
  components:
  - type: GhostRole
    makeSentient: true
    allowMovement: true
    allowSpeech: true
    name: ghost-role-information-foliant-name
    description: ghost-role-information-foliant-description
    rules: ghost-role-information-foliant-rules
    raffle:
      settings: short
    mindRoles:
    - MindRoleGhostRoleFamiliar
  - type: GhostRoleMobSpawner
    prototype: MobBook
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
      - state: green
      - sprite: _Sunrise/Mobs/Pets/dogbook.rsi
        state: dogbook


- type: entity
  parent: MarkerBase
  id: SpawnPointGhostTerminator
  name: terminator spawn point
  components:
  - type: GhostRole
    name: ghost-role-information-exterminator-name
    description: ghost-role-information-exterminator-description
    rules: ghost-role-information-exterminator-rules
    raffle:
      settings: default
    mindRoles:
    - MindRoleGhostRoleSoloAntagonist
  - type: GhostRoleMobSpawner
    prototype: MobHumanTerminator
  - type: Sprite
    layers:
    - state: green
    - sprite: Mobs/Species/Terminator/parts.rsi
      state: full

- type: entity
  id: SpawnPointGhostCarpQueen
  parent: SpawnPointGhostFoliant
  suffix: carp queen
  components:
  - type: GhostRole
    name: ghost-role-information-carp-queen-name
    description: ghost-role-information-carp-queen-description
    rules: ghost-role-information-freeagent-rules
    mindRoles:
    - MindRoleGhostRoleFreeAgent
    raffle:
      settings: default
  - type: GhostRoleMobSpawner
    prototype: MobCarpQueen
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
      - state: green
      - sprite: Mobs/Aliens/Carps/sharkminnow.rsi
        state: icon

# separate rat king spawner for low-pop no-guard variant
- type: entity
  id: SpawnPointGhostRatKingNoGuard
  name: ghost role spawn point
  suffix: rat king, no guard
  parent: MarkerBase
  components:
  - type: GhostRole
    name: ghost-role-information-rat-king-name
    description: ghost-role-information-rat-king-description
    rules: ghost-role-information-antagonist-rules
    mindRoles:
    - MindRoleGhostRoleSoloAntagonist
    raffle:
      settings: default
  - type: GhostRoleMobSpawner
    prototype: MobRatKingNoGuard
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
      - state: green
      - sprite: Mobs/Animals/regalrat.rsi
        state: icon
