# region ---- Lasers ----
- type: entity
  id: ShuttleGunBeamstormMachineGun
  parent: [ ShuttleGunBase, ConstructibleMachine]
  name: LSE-800e "Beamstorm machine gun"
  description: Advanced stationary laser unit. Effective against live targets and electronics. Draws directly from the ship's APC grid, and has an extremely high rate of fire.
  #categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Shuttles/laser.rsi
    layers:
    - state: lse-800c
    - state: mag-unshaded-9
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      cell_slot: !type:ContainerSlot
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    fireRate: 10
    useKey: false
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ship_svalinn.ogg
      params:
        variation: 0.05
  - type: GunneryTrackable
  - type: MagazineVisuals
    magState: mag
    steps: 10
    zeroVisible: true
  - type: Machine
    board: ShuttleGunBeamstormMachineGunCircuitboard
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: Battery
    maxCharge: 2000
    startingCharge: 2000
    netsync: false
  - type: ApcPowerReceiverBattery
    idleLoad: 500
    batteryRechargeRate: 100    # recharge full in ~20s at full draw
    batteryRechargeEfficiency: 1.0
  - type: ApcPowerReceiver
    powerLoad: 5000
  - type: ExtensionCableReceiver
  - type: BatteryAmmoProvider
    proto: RedShuttleMediumLaser
    fireCost: 25
  - type: RadarLaserTracker
    laserColor: "#FF44FF"
    traceDuration: 0.5
    maxRange: 40

# TSL Tesla
- type: entity
  id: ShuttleGunTeslaOrion
  parent: [ ShuttleGunBase, ConstructibleMachine]
  name: TSL-200c "Orion"
  description: Hi-tech stationary energy unit based on the principle of an experimental Tesla engine.. Effective against electronics. Uses the power cage to fire tesla or ion bolt.
  #categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Shuttles/tesla.rsi
    layers:
    - state: tsl-200c
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      cell_slot: !type:ContainerSlot
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    fireRate: 0.6
    projectileSpeed: 28
    useKey: false
    soundGunshot:
      path: /Audio/Effects/Lightning/lightningshock.ogg
      params:
        variation: 0.2
  - type: GunneryTrackable
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Machine
    board: ShuttleGunTeslaOrionCircuitboard
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: Magazine
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - PowerCage
  - type: BatteryAmmoProvider
    proto: TeslaGunBulletOrion # Sunrise-Edit
    fireCost: 400
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: TeslaGunBulletOrion # Sunrise-Edit
      fireCost: 400
    - proto: BulletEMPMedium
      fireCost: 500
  - type: AmbientSound
    enabled: true
    sound:
      path: /Audio/Effects/tesla.ogg
    range: 5
    volume: -13

