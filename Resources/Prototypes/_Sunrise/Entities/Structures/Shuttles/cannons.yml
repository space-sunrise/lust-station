# region ---- Autocannon ----
# naming: BAL (Ballistic) + calliber + Name
# example: BAL-152 "Molot"

- type: entity
  id: ShuttleGunLongbow
  parent: [ShuttleGunBase, ConstructibleMachine]
  name: BAL-15 "Longbow"
  description: A powerful stationary heavy autocanon. A cartridge is required for use.
  #categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Shuttles/bal_127.rsi
    granularLayersRendering: true
    #scale: 1.1, 1.1
    layers:
    - sprite: Objects/Weapons/Guns/Turrets/sentry_turret.rsi
      state: support
      renderingStrategy: NoRotation
    - sprite: Objects/Weapons/Guns/Turrets/sentry_turret.rsi
      state: cover_open
      renderingStrategy: NoRotation
    - state: bal-127
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-7
      map: ["enum.GunVisualLayers.Mag"]
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      gun_magazine: !type:ContainerSlot
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 800
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    minAngle: 1
    maxAngle: 3
    projectileSpeed: 50
    fireRate: 0.8
    soundGunshot:
      path: /Audio/_Sunrise/Weapons/Guns/Snipers/Bauer127/bauer127_shot.ogg
      params:
        pitch: 1.1
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: GunneryTrackable
  - type: Machine
    board: ShuttleGunLongbowCircuitboard
  - type: MagazineAmmoProvider
  - type: MagazineVisuals
    magState: mag
    steps: 8
    zeroVisible: false
  - type: Fixtures # Sunrise-Add
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 200
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        priority: 2
        whitelist:
          tags:
          - MagazineBauer127
        insertSound:
          path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
          params:
            pitch: 2
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: AutoLoader # Sunrise-Add
    container: gun_magazine
    whitelist:
      tags:
      - MagazineBauer127
  - type: AutoLinkReceiver
    channel: Longbow

