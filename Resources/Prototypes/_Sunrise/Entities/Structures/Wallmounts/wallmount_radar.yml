- type: entity
  parent: BaseWallmountMetallic
  id: WallmountRadarBroken
  name: broken mass scanner computer
  description: A wall-mounted console for detecting nearby bodies by position and mass. Its screen is cracked and lifeless.
  suffix: Wall broken
  components:
    - type: Sprite
      scale: 0.85,0.85
      sprite: _Starlight/Structures/Machines/wall_mount_mass_scanner.rsi
      drawdepth: WallMountedItems
      layers:
      - state: mass_scanner0
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 100
          behaviors:
            - !type:PlaySoundBehavior
              sound:
                collection: GlassBreak
            - !type:DoActsBehavior
              acts: [ "Destruction" ]

- type: entity
  parent: BaseWallmountMachine
  id: WallmountRadar
  suffix: radar monitor
  name: mass scanner computer
  description: A wall-mounted console for detecting nearby bodies by position and mass.
  components:
    - type: StationAiWhitelist
    - type: WallMount
      arc: 360
    - type: Appearance
    - type: Sprite
      scale: 0.85,0.85
      sprite: _Starlight/Structures/Machines/wall_mount_mass_scanner.rsi
      layers:
      - state: mass_scanner0
      - state: unshaded
        shader: unshaded
    - type: Icon
      sprite: _Starlight/Structures/Machines/wall_mount_mass_scanner.rsi
      state: mass_scanner0
    - type: ContainerFill
      containers:
        board: [ RadarConsoleCircuitboard ]
    - type: ApcPowerReceiver
      powerLoad: 200
    - type: Construction
      graph: WallmountRadar
      node: mass_scanner
    - type: Destructible
      thresholds:
      - trigger: # Excess damage, don't spawn entities
          !type:DamageTrigger
          damage: 200
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: GlassBreak
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: GlassBreak
        - !type:SpawnEntitiesBehavior
          spawn:
            WallmountRadarBroken:
              min: 1
              max: 1
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - type: ContainerContainer
      containers:
        board: !type:Container
          ents: []
    - type: PointLight
      radius: 1.5
      energy: 4.0
      color: "#e6e227"
    - type: RadarConsole
    - type: Computer
      board: RadarConsoleCircuitboard
    - type: ActivatableUI
      key: enum.RadarConsoleUiKey.Key
    - type: ActivatableUIRequiresPower
    - type: ActivatableUIRequiresVision
    - type: UserInterface
      interfaces:
        enum.RadarConsoleUiKey.Key:
          type: RadarConsoleBoundUserInterface
    - type: EmitSoundOnUIOpen
      sound:
        collection: Keyboard
        params:
          volume: -1
          variation: 0.10
          pitch: 1.10  # low pitch keyboard sounds feel kinda weird

- type: entity
  parent: BaseWallmountMetallic
  id: WallmountRadarAssembly
  name: mass scanner computer assembly
  description: A mass scanner computer assembly.
  components:
  - type: WallMount
    arc: 360
  - type: Sprite
    sprite: Structures/Machines/station_map.rsi
    layers:
    - state: station_map_frame1
      map: [ "enum.ConstructionVisuals.Layer" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ConstructionVisuals.Key:
        enum.ConstructionVisuals.Layer:
          assembly: { state: station_map_frame0 }
          wired: { state: station_map_frame1 }
          electronics: { state: station_map_frame2 }
  - type: Construction
    graph: WallmountRadar
    node: assembly
