- type: entity
  parent: BaseWallmountMachine
  id: WallmountRadar
  suffix: radar monitor
  name: mass scanner computer
  description: A wall-mounted console for detecting nearby bodies by position and mass.
  components:
  - type: StationAiWhitelist
  - type: Sprite
    sprite: Structures/Machines/computers.rsi
    layers:
    - map: [ "computerLayerBody" ]
      state: telescreen_frame
    - map: [ "computerLayerScreen" ]
      state: telescreen
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
  - type: PointLight
    radius: 1.5
    energy: 4.0
    color: "#e6e227"
  - type: RadarConsole
  - type: Computer
    board: RadarConsoleCircuitboard
  - type: ActivatableUI
    key: enum.RadarConsoleUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: ActivatableUIRequiresVision
  - type: UserInterface
    interfaces:
      enum.RadarConsoleUiKey.Key:
        type: RadarConsoleBoundUserInterface
