- type: entity
  parent: VendingMachine
  id: VendingMachineBarber
  name: barberWend
  description: This is where you can buy items to fix a messed up hairstyle.
  components:
  - type: VendingMachine
    pack: BarberInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
  - type: Vocalizer
  - type: DatasetVocalizer
    dataset: BarberAds
  - type: AccessReader
    access: [["Barber", "Service"]]
  - type: SpeakOnUIClosed
    pack: GenericVendGoodbyes
  - type: Speech
  - type: Sprite
    sprite: _Sunrise/Structures/Machines/VendingMachines/barbervend.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]

- type: entity
  parent: VendingMachine
  id: VendingMachineClown
  name: HohohonkersVend
  description: Get your honk fix here! Surprise the station with HohohonkersVend — the ultimate machine for hilarious pranks. Hack it, and you'll unlock something special!
  components:
  - type: VendingMachine
    pack: HohohonkersInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    ejectState: eject-unshaded
    denyState: deny-unshaded
  - type: Vocalizer
  - type: DatasetVocalizer
    dataset: HonkersAds
  - type: AccessReader
    access: [["Theatre"]]
  - type: SpeakOnUIClosed
    pack: GenericVendGoodbyes
  - type: Speech
  - type: Sprite
    sprite: _Sunrise/Structures/Machines/VendingMachines/hohohonkers.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]

- type: entity
  parent: VendingMachineSecDrobe
  id: VendingMachinePrisonDrobe
  name: PrisonDrobe
  description: A legacy of old penitentiary modules, adapted for modern facilities with full isolation of staff and inmates.
  components:
  - type: VendingMachine
    pack: PrisonDrobeInventory

- type: entity
  parent: VendingMachine
  id: VendingMachineEVASuitDispenser
  name: EVA suit dispenser
  description: A vendor for dispensing EVA suits and helmets for emergency use.
  components:
  - type: VendingMachine
    pack: EVASuitDispenserInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
  - type: Vocalizer
  - type: DatasetVocalizer
    dataset: EVAdispenserAds
  - type: Sprite
    sprite: _Sunrise/Structures/Machines/VendingMachines/evavend.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PlayerCountDependentStock

- type: entity
  id: BaseTicketVendingMachine
  parent: BaseMachinePowered
  name: vending machine
  description: Just add capitalism!
  abstract: true
  components:
  - type: Sprite
    sprite: _Sunrise/Structures/Machines/VendingMachines/mining.rsi
    snapCardinals: true
    layers:
    - state: off
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: normal-unshaded
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
  - type: StationAiWhitelist
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -9
    range: 3
    enabled: false
    sound:
      path: /Audio/Ambience/Objects/vending_machine_hum.ogg
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.16,0.3,0.40"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 190
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Breakage"]
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
  - type: Repairable
    doAfterDelay: 8
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: WiresPanel
  - type: Wires
    layoutId: Vending
  - type: Anchorable
  - type: Electrified
    enabled: false
    usesApcPower: true
  - type: PointLight
    enabled: false
    castShadows: false
    radius: 1.5
  - type: LitOnPowered
  - type: ApcPowerReceiver
    powerLoad: 200
  - type: StaticPrice
    price: 100
  - type: Appearance
  - type: WiresVisuals
  - type: Store
    name: store-preset-name-spellbook
    categories: []
    currencyWhitelist:
    - NTCredit

- type: entity
  parent: BaseTicketVendingMachine
  id: VendingMachineSalvageTicket
  name: salvage ticket machine
  components:
  - type: AccessReader
    access: [["Salvage"]]
  - type: Sprite
    sprite: _Sunrise/Structures/Machines/VendingMachines/salvage.rsi
    snapCardinals: true
    layers:
    - state: off
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: normal-unshaded
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
  - type: Store
    name: vendor-salvage-ticket-machine
    categories:
    - SalvageEquipment
    - SalvageWeapons
    - SalvageConsumeables
    currencyWhitelist:
    - SalvageTicket

- type: entity
