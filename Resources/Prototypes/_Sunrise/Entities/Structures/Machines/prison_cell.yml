- type: entity
  parent: AirlockSecurityGlassLocked
  id: PrisonCellDoor
  components:
  - type: PrisonCellDoor
  - type: AccessReader
    access: [["Security"]]
  - type: DeviceLinkSink
    ports:
      - PrisonCellDoorLock
      - PrisonCellDoorUnlock
      - Open
      - Close
      - Toggle

- type: entity
  parent: Screen
  id: PrisonCellTimer
  components:
  - type: PrisonTimer
  - type: DeviceLinkSink
    ports:
      - PrisonTimerSet
      - PrisonTimerReset
  - type: TextScreenVisuals
    textOffset: 0,3
    rowOffset: 6
    rows: 2
    rowLength: 6

- type: entity
  parent: LockerSecurity
  id: PrisonCellLocker
  name: prisoner closet
  description: It's a secure locker for an inmate's personal belongings during their time in prison.
  suffix: 1
  components:
  - type: PrisonLocker
  - type: AccessReader
    access: [["Security"]]
  - type: DeviceLinkSink
    ports:
      - PrisonLockerLock
      - PrisonLockerUnlock
  - type: EntityStorageVisuals
    stateBaseClosed: genpop
    stateDoorOpen: genpop_open
    stateDoorClosed: genpop_door_1

