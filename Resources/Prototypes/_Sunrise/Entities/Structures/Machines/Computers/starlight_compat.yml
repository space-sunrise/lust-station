- type: entity
  id: ComputerShuttleSalvage
  parent: BaseComputerShuttle
  name: salvage shuttle console
  description: Used to pilot the salvage shuttle.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      sprite: _Starlight/Structures/Machines/computers.rsi
      state: shuttle-salvage
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: DroneConsole
    components:
    - type: SalvageShuttle
  - type: RadarConsole
    maxRange: 256
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#735ec3"
  - type: Computer
    # Starlight board SalvageShuttleConsoleCircuitboard is not ported.
    board: CargoShuttleConsoleCircuitboard
  - type: StealTarget
    stealGroup: CargoShuttleConsoleCircuitboard

- type: entity
  id: ComputerCommsCargo
  parent: ComputerComms
  name: cargo communications console
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      sprite: _Starlight/Structures/Machines/computers.rsi
      state: comm-sup
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: AccessReader
    access: [[ "Quartermaster" ]]
  - type: CommunicationsConsole
    title: comms-console-announcement-title-sup
    sound: /Audio/Announcements/announce.ogg # Starlight used /Audio/_Starlight/Announcements/announce2.ogg.
    color: "#b48b57"
    canShuttle: false
  - type: Computer
    # Starlight department comms boards are not ported.
    board: CommsComputerCircuitboard
  - type: PointLight
    radius: 2.5
    energy: 1.5
    color: "#b48b57"

