- type: entity
  id: ComputerPersonalDesktop
  parent: ComputerId
  name: personal desktop computer
  description: For all your stationary computing needs!
  components:
  # Full Starlight desktop PDA/store behavior depends on BaseDesktop and ComputerPersonalCircuitboardDesktop, which are not ported.
  - type: Sprite
    sprite: _Starlight/Structures/Machines/desktop_computers.rsi
    drawdepth: SmallObjects
    offset: 0,0.2
    noRot: true
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: personal
    - map: ["computerLayerKeys"]
      state: service_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: EdgeConnection
    connectionKey: computersDesktop
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
        computerLayerKeys:
          True: { visible: true, shader: unshaded }
          False: { visible: true, shader: shaded }
      enum.WiresVisuals.MaintenancePanelState:
        enum.WiresVisualLayers.MaintenancePanel:
          True: { visible: false }
          False: { visible: true }
      enum.EdgeConnectionVisuals.ConnectionMask:
        computerLayerBody:
          None: { state: computer, sprite: _Starlight/Structures/Machines/desktop_computers.rsi }
  - type: Computer
    board: IDComputerCircuitboard
  - type: Instrument
    program: 2
    allowPercussion: true
    allowProgramChange: true

