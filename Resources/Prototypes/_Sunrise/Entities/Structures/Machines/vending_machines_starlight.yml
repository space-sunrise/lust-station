- type: entity
  parent: VendingMachineSnack
  id: VendingMachineDonk
  name: Donk on the Go
  description: "Hot and ready when you're on the run! Donk Pockets: it's food, legally."
  components:
  - type: VendingMachine
    pack: DonkPocketsMachineInventory
    dispenseOnHitChance: 0.25
    dispenseOnHitThreshold: 2
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    ejectState: eject-unshaded
    denyState: deny-unshaded
    ejectDelay: 2
  # Starlight board VendingMachineDonkCircuitboard is not ported.
  # Starlight ad datasets DonkPocketMachineAds and DonkPocketMachineGoodbyes are not ported.
  - type: Sprite
    sprite: _Starlight/Structures/Machines/VendingMachines/donk.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.5
    energy: 2.0
    color: "#ad7c4b"

- type: entity
  parent: VendingMachineLawDrobe
  id: VendingMachineLegalDrobe

- type: entity
  parent: VendingMachineMedical
  id: VendingMachineMedicalSyndicate
  name: Interdyne Enterprise
  components:
  - type: VendingMachine
    pack: InterdyneEnterpriseInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    ejectState: eject-unshaded
    denyState: deny-unshaded
    ejectDelay: 0.6
  # Starlight Interdyne ad dataset is not ported.
  - type: Sprite
    sprite: _Starlight/Structures/Machines/VendingMachines/interdyne_medical.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.5
    energy: 3.0
    color: "#9dc5c9"
  - type: AccessReader
    access: [["Medical"], ["SyndicateAgent"]]

- type: entity
  parent: VendingMachineWallMedicalCivilian
  id: VendingMachineWallMedicalCivilianSyndicate
  name: Interdyne life-aid commercial
  description: It's a wall-mounted medical equipment dispenser by Interdyne Pharmaceutics.
  components:
  - type: VendingMachine
    pack: InterdyneCommercialWallInventory
    offState: off-civilian
    brokenState: broken
    normalState: normal-unshaded
    denyState: deny-unshaded
  - type: Sprite
    sprite: _Starlight/Structures/Machines/VendingMachines/interdyne_wallmed.rsi
    layers:
    - state: "off-civilian"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off-civilian"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - texture: Structures/Machines/VendingMachines/maintenance_panel.png
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.3
    energy: 3.0
    color: "#43ccb5"

- type: entity
