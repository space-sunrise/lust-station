    factions:
    - Pirate
  - type: Gun
    burstFireRate: 8
    shotsPerBurst: 5
    burstCooldown: 0.3
    minAngle: 1
    maxAngle: 30
    angleIncrease: 5
    angleDecay: 8
    selectedMode: Burst
    availableModes:
