- type: entity
  abstract: true
  parent: BaseMagazineGrenade
  id: BaseMagazineGrenadeExtended
  name: grenade extended cartridge
  description: A large grenade cartridge with increased payload.
  components:
  - type: BallisticAmmoProvider
    capacity: 15
  - type: Sprite
    scale: 1,1.2
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/Grenade/grenade_cartridge.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-4
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  parent: BaseMagazineGrenadeExtended
  id: MagazineGrenadeEmptyExtended
