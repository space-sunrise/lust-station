- type: entity
  id: MagazineP90
  name: P90 magazine (SP)
  parent: BaseItem
  components:
  - type: Tag
    tags:
    - MagazineP90
  - type: BallisticAmmoProvider
    mayTransfer: true
    proto: CartridgePistolSP
    whitelist:
      tags:
      - CartridgePistol
    capacity: 50
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Ammunition/Magazines/p90.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Appearance

