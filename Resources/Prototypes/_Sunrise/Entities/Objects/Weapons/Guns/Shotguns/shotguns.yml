# region Admeme
- type: entity
  name: "AS-12 'Hasta la vista' Shotgun"
  parent: [BaseWeaponShotgunAny, BaseGunWieldable, BaseSyndicateContraband]
  id: WeaponShotgunMinotaurAdmeme
  description: Smooth, powerful, highly illegal. Full auto shotgun available at the market, utilizes standard 12g drum mags. Property of Admeme-Marauders. Can be Dual Wielded with another AS-12 for maximum carnage.
  suffix: Admeme
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/minotaur.rsi
    layers:
    - state: base
      color: "#ff9a7b"
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Large
    shape:
    - 0,0,3,2
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/minotaur.rsi
  - type: Gun
    spread: 20
    fireRate: 3.5
    projectileSpeed: 30
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Guns/Gunshots/minotaur.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineShotgunXL
        priority: 2
        whitelist:
          tags:
          - MagazineShotgun
        whitelistFailPopup: gun-magazine-whitelist-fail
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: Appearance
  - type: CanDualWield
    dualWieldInaccuracyPenalty: 2
    dualWieldFireRatePenalty: 0.35
    dualWieldRecoilPenalty: 0.35
