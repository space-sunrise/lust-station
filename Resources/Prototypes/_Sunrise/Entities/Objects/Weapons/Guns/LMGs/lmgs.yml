- type: entity
  name: pirate cannon
  parent: BaseWeaponLightMachineGun
  id: WeaponLightMachineGunPirateCannon
  description: Kaboom!
  components:
    - type: Sprite
      sprite: _Sunrise/Objects/Weapons/Guns/LMGs/piratecannon.rsi
      layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-3
        map: ["enum.GunVisualLayers.Mag"]
        type: ContainerContainer
    - type: Clothing
      sprite: _Sunrise/Objects/Weapons/Guns/LMGs/piratecannon.rsi
    - type: Item
      size: Huge
      shape:
      - 0,0,4,3
      sprite: _Sunrise/Objects/Weapons/Guns/LMGs/piratecannon_inhands_64x.rsi
      storedSprite:
        state: storage
        sprite: _Sunrise/Objects/Weapons/Guns/LMGs/piratecannon_storage_64x.rsi
    - type: Gun
      fireRate: 6.5
      soundGunshot:
        path: /Audio/Weapons/Guns/Gunshots/mateba.ogg
        params:
          volume: -1
          pitch: 1.2
      projectileSpeed: 20
      bigTrigger: true
      selectedMode: FullAuto
      availableModes:
        - FullAuto
    - type: GunRequiresWield
    - type: ChamberMagazineAmmoProvider
      soundRack:
        path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
        params:
          volume: -10
          pitch: 0.8
      soundAutoEject:
        path: /Audio/Weapons/Guns/MagOut/lmg_magout.ogg
      autoEject: true
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: MagazineCannonBallMini
          insertSound: /Audio/_Sunrise/Weapons/Guns/LMGs/reload.ogg
          ejectSound: /Audio/_Sunrise/Weapons/Guns/LMGs/unload.ogg
          priority: 2
          whitelist:
            tags:
            - MagazineCannonBallMini
        gun_chamber:
          name: Chamber
          startingItem: CannonBallMini
          priority: 1
          whitelist:
            tags:
            - CannonBallMini
    - type: SpeedModifiedOnWield
      walkModifier: 0.75
      sprintModifier: 0.75
    - type: Appearance
    - type: MagazineVisuals
      magState: mag
      steps: 6
      zeroVisible: true
    - type: StaticPrice
      price: 4000
    - type: KnockbackByUserTag
      doestContain:
        Resomi:
          knockback: 2
          staminaMultiplier: 15
        Felinid:
          knockback: 1 #half of what resomi take
          staminaMultiplier: 15

