- type: entity
  parent: BaseItem
  id: SunriseFireBombSatchel1
  name: fire bomb bundle
  suffix: 1/3
  description: A cardboard-fixed bundle for combining incendiary bombs.
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Bombs/ied_satchel.rsi
    state: stage1
  - type: Item
    sprite: _Sunrise/Objects/Weapons/Bombs/ied_satchel.rsi
  - type: Construction
    graph: FireBomb
    node: sunrisebundle1
    defaultTarget: sunrisebundle3

- type: entity
  parent: SunriseFireBombSatchel1
  id: SunriseFireBombSatchel2
  suffix: 2/3
  description: A growing bundle of incendiary bombs.
  components:
  - type: Sprite
    state: stage2
  - type: Construction
    node: sunrisebundle2
    defaultTarget: sunrisebundle3

- type: entity
  parent: BaseItem
  id: SunriseFireBombBundle
  name: fire bomb bundle
  description: A dense improvised package assembled from multiple incendiary bombs.
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Bombs/ied_satchel.rsi
    layers:
    - state: icon
      map: ["base"]
  - type: Item
    sprite: _Sunrise/Objects/Weapons/Bombs/ied_satchel.rsi
    size: Normal
  - type: MultiHandedItem
  - type: Sticky
    stickDelay: 5
    unstickDelay: 5
    stickPopupStart: comp-sticky-start-stick-bomb
    stickPopupSuccess: comp-sticky-success-stick-bomb
    unstickPopupStart: comp-sticky-start-unstick-bomb
    unstickPopupSuccess: comp-sticky-success-unstick-bomb
    blacklist:
      components:
      - Item
  - type: StickyVisualizer
  - type: TriggerOnStuck
    keyOut: stuck
  - type: TimerTrigger
    keysIn:
    - stuck
    delay: 2
    examinable: false
    initialBeepDelay: 0
    beepSound:
      path: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
      params:
        volume: 3
  - type: RandomTimerTrigger
    min: 2
    max: 20
  - type: Explosive
    explosionType: FireBomb
    totalIntensity: 75
    intensitySlope: 5
    maxIntensity: 20
    canCreateVacuum: false
  - type: ExplodeOnTrigger
    keysIn:
    - timer
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.Trigger.TriggerVisuals.VisualState:
        base:
          Primed: { state: primed }
          Unprimed: { state: icon }
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:ExplodeBehavior
  - type: Construction
    graph: FireBomb
    node: sunrisebundle3
