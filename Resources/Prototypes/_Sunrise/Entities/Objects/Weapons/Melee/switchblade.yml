- type: entity
  name: switchblade
  parent: [CombatKnife, BaseMinorContraband]
  id: WeaponMeleeSwitchblade
  description: SCHINK! So cool.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Melee/switchblade.rsi
    layers:
    - state: switchblade
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Item
    size: Tiny
    shape:
    - 0,0,0,0
    sprite: _Starlight/Objects/Weapons/Melee/switchblade.rsi
    storedSprite:
  - type: ItemToggle
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Slash: 10
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1
    damage:
      types:
        Blunt: 2
        Structural: 4
  - type: ComponentToggler
    components:
    - type: DamageOtherOnHit
      damage:
        types:
          Slash: 8
    - type: EmbeddableProjectile
      sound: /Audio/Weapons/star_hit.ogg
      offset: -0.15,0.0
  - type: ItemToggleSize
    activatedSize: Small
    activatedShape:
    - 0,0,0,1
    deactivatedSize: Tiny
    deactivatedShape:
    - 0,0,0,0
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: icon }
          False: { state: switchblade }
  - type: UseDelay # bug fix to prevent spamming use to reset the swing delay
  - type: ThrowingAngle
    angle: 180
