- type: entity
  name: breaching hammer
  parent: BaseItem
  id: SecBreachingHammer
  description: A large, heavy hammer with a long handle, used for breaking stones or other heavy material such as the skulls of violent criminals, also perfect for forcing your way trough airlocks.
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Melee/breaching_hammer.rsi
    state: icon
  - type: Item
    size: Ginormous
  - type: MeleeWeapon
    attackRate: 0.7
    range: 1.70
    damage:
      types:
        Blunt: 5
        Structural: 25
    soundHit:
      collection: MetalThud
    bluntStaminaDamageFactor: 1.5
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 20
        Structural: 110
  - type: Tool
    qualities:
      - Prying
    useSound: /Audio/Items/jaws_pry.ogg
  - type: Prying
    speedModifier: 1
    pryPowered: true
    useSound: /Audio/Items/jaws_pry.ogg
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Melee/breaching_hammer.rsi
    quickEquip: false
    slots:
    - back
    - suitStorage


