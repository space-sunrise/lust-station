- type: entity
  name: fancy cane
  parent: BaseItem
  id: CaneNT
  description: A cane with special engraving on it. It seems well suited for fending off assailants...
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Melee/cane_nt.rsi
    layers:
    - state: cane-nt
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Stunbaton
    energyPerUse: 25
  - type: ItemToggle
    predictable: false
    soundActivate:
      collection: sparks
      params:
        variation: 0.250
    soundDeactivate:
      collection: sparks
      params:
        variation: 0.250
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
      params:
        variation: 0.250
  - type: ItemTogglePrefix
    prefixOn: on
    prefixOff: off
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Blunt: 0
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 10
    bluntStaminaDamageFactor: 2.0
    angle: 60
    animation: WeaponArcSlash
  - type: StaminaDamageOnHit
    damage: 40
    sound: /Audio/Weapons/egloves.ogg
  - type: StaminaDamageOnCollide
    damage: 40
    sound: /Audio/Weapons/egloves.ogg
  - type: LandAtCursor
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: UseDelay
  - type: Item
    heldPrefix: off
    size: Normal
  - type: DisarmMalus
    malus: 0.300
  - type: Appearance
  - type: GenericVisualizer
    visuals:
     enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: cane-nt-active}
          False: {state: cane-nt}
  - type: Riggable
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 5
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: EmitSoundOnWearerMove
    sound:
      collection: FootstepHighHeels
      params:
        volume: -6
        pitch: 1.1
        variation: 0.09
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Melee/cane_nt.rsi
    slots:
    - Belt

- type: entity
  parent: WeaponFlareGun #VoiceLock
  id: CaneShotgun
  name: cane
  description: A wooden cane.
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Shotguns/cane_shotgun.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1
    sprite: _Sunrise/Objects/Weapons/Guns/Shotguns/cane_shotgun.rsi
  - type: Appearance
  - type: Gun
    fireRate: 4
    useKey: true
    selectedMode: SemiAuto
  - type: StaminaDamageOnHit
    damage: 5
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 3
  - type: MeleeWeapon
    wideAnimationRotation: 45
    damage:
      types:
        Blunt: 5
    bluntStaminaDamageFactor: 2.0
    attackRate: 1
    autoAttack: false
  - type: AltFireMelee
    attackType: Heavy
  - type: ItemSlots
    slots:
      gun_chamber:
        name: Chamber
        startingItem: ShellShotgunBooze
        priority: 1
        whitelist:
          tags:
            - ShellShotgun
  - type: UseDelay
    delay: 1
  - type: EmitSoundOnWearerMove
    sound:
      collection: FootstepHighHeels
      params:
        volume: -6
        pitch: 0.9
        variation: 0.09
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/Shotguns/cane_shotgun.rsi
    slots:
    - Belt
