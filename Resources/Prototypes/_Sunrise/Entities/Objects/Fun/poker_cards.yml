- type: entity
  id: PokerCardBox
  parent: [ BaseStorageItem, BaseBagOpenClose ]
  name: card bin
  suffix: CardBox ,Empty
  description: Its bin for poker cards .What secrets lie at the bottom of its endless stack?
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Fun/Cards/cardbox.rsi
    scale: 0.5,0.5
    state: closed
    layers:
    - state: closed
      map: ["closeLayer"]
    - state: open
      map: ["openLayer"]
      visible: false
    - state: card1
      map: ["card1"]
      visible: false
    - state: card2
      map: ["card2"]
      visible: false
    - state: card3
      map: ["card3"]
      visible: false
    - state: card4
      map: ["card4"]
      visible: false
  - type: Storage
    quickInsert: true
    areaInsert: true
    grid:
    - 0,0,8,5
    maxItemSize: Huge
    whitelist:
      tags:
        - PokerCard
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: Item
    sprite: _Sunrise/Objects/Fun/Cards/cardbox.rsi
    size: Small
  - type: ItemCounter
    count:
      tags: [PokerCard]
    composite: true
    layerStates:
    - card1
    - card2
    - card3
    - card4
  - type: Appearance
  - type: Dumpable

