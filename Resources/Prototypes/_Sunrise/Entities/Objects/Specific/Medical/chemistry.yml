- type: entity
  name: golden beaker
  parent: BaseBeaker
  description: Used to contain a moderate amount of chemicals and solutions.
  id: GoldenBeaker
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Specific/Chemistry/beaker.rsi
    scale: 0.9,0.9
    layers:
      - state: beaker
      - state: beaker1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    size: Normal
    storedOffset: 0,3
    sprite: _Starlight/Objects/Specific/Chemistry/beaker.rsi
  - type: Spillable
    solution: beaker
  - type: StaticPrice
    price: 10
  - type: PhysicalComposition
    materialComposition:
      Glass: 50
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: beaker
    inHandsMaxFillLevels: 3
    inHandsFillBaseName: -fill-
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 150
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -4
      - !type:SpillBehavior
        solution: beaker
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassClockwork:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  name: bluespace jug
  parent: Jug
  id: JugBluespace
  description: Uses bluespace technology to contain an impossible amount of liquid.
  components:
    - type: SolutionContainerManager
      solutions:
        beaker:
          maxVol: 1000
    - type: Sprite
      sprite: _Sunrise/Objects/Specific/Chemistry/jug_bluespace.rsi
      layers:
        - state: jug
        - state: jug-unlit
          shader: unshaded
        - state: jug1
          map: [ "enum.SolutionContainerLayers.Fill" ]
          visible: false
    - type: Item
      sprite: _Sunrise/Objects/Specific/Chemistry/jug_bluespace.rsi
      inhandVisuals:
        left:
        - state: inhand-left
        - state: inhand-left-unlit
          shader: unshaded
        - state: inhand-left-fill-1
          map: [ "enum.SolutionContainerLayers.Fill" ]
          visible: false
        right:
        - state: inhand-right
        - state: inhand-right-unlit
          shader: unshaded
        - state: inhand-right-fill-1
          map: [ "enum.SolutionContainerLayers.Fill" ]
          visible: false
    - type: StaticPrice
      price: 30 # Consistent with BaseBeakerMetallic
    - type: Destructible # Hacky - takes damage, but shouldn't be destructible
      thresholds: []

- type: entity
  name: bluespace vial
  parent: BaseBeakerMetallic
  id: VialBluespace
  description: A vial device created with bluespace technology.
  components:
  - type: Tag
    tags:
    - CentrifugeCompatible
  - type: Sprite
    sprite: _Sunrise/Objects/Specific/Chemistry/vial_bluespace.rsi
    layers:
    - state: vialbluespace
    - state: vialbluespace-1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: SolutionContainerVisuals
    maxFillLevels: 6
    fillBaseName: vial-1-
    inHandsMaxFillLevels: 4
    inHandsFillBaseName: -fill-
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 300
  - type: SolutionTransfer
    maxTransferAmount: 300
  - type: Item
    size: Tiny
    sprite: _Sunrise/Objects/Specific/Chemistry/vial_bluespace.rsi
  - type: StaticPrice
    price: 100
