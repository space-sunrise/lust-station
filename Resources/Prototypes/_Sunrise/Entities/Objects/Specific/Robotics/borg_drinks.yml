- type: entity
  id: BaseDrinkBorg
  abstract: true
  components:
  - type: Unremoveable
    deleteOnDrop: true

- type: entity
  id: DrinkCoconutWaterJugBorg
  parent: [ DrinkCoconutWaterJug, BaseDrinkBorg ]
  categories: [ HideSpawnMenu ]
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 50
        reagents:
        - ReagentId: CoconutWater
          Quantity: 50
  - type: SolutionRegeneration
    solution: drink
    generated:
      reagents:
      - ReagentId: CoconutWater
        Quantity: 3

