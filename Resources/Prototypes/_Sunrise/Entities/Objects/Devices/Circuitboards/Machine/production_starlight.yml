- type: entity
  id: ScanGateMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: scan gate machine board
  description: A machine printed circuit board for a scan gate
  components:
    - type: Sprite
      state: service
    - type: MachineBoard
      prototype: ScanGate
      stackRequirements:
        Steel: 5
        Glass: 2
        Cable: 10

- type: entity
  parent: BaseMachineCircuitboard
  id: AssortedForgeParts
  name: assorted forge parts
  description: A small pile of components for making a forge for an anvil, contains an igniter and valves.
  components:
    - type: MachineBoard
      prototype: TiderLathe
      stackRequirements:
        Plasteel: 13
        Steel: 5
      tagRequirements:
        GasTank:
          amount: 2
          defaultPrototype: OxygenTankFilled
    - type: Sprite
      sprite: _Starlight/Objects/Devices/assorted_forge_parts.rsi
      state: icon
    - type: Construction
      graph: AssortedForgeParts
      node: finish
