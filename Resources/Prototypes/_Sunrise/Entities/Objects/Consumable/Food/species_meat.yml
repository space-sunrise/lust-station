- type: entity
  abstract: true
  parent: FoodMeatRawBase
  id: FoodMeatSpeciesBase
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Consumable/Food/species_meat.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 9
        - ReagentId: Fat
          Quantity: 9
  - type: SliceableFood
    count: 3
    slice: FoodMeatCutlet
  - type: InternalTemperature
    conductivity: 0.43
  - type: Construction
    graph: MeatSteak
    node: start
    defaultTarget: meat steak
  - type: Item
    storedOffset: -2,1

