- type: entity
  id: DiseaseRule
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: DiseaseRule
  # Sunrise edit start - antagonist spawning and event configuration
  - type: StationEvent
    minimumPlayers: 40
    weight: 5
    maxOccurrences: 1
    earliestStart: 30
    reoccurrenceDelay: 20
    duration: null
  - type: AntagSpawner
    prototype: MobDisease
  - type: AntagSelection
    agentName: disease-agent-name
    definitions:
    - spawnerPrototype: SpawnPointGhostDisease
      min: 1
      max: 1
      pickPlayer: false
  # Sunrise edit end



- type: entity
  id: Fugitive
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: StationEvent
    weight: 15
    earliestStart: 10
    minimumPlayers: 10
    reoccurrenceDelay: 20
    duration: null
  - type: LateJoinSpawnRule
    prototype: SpawnPointGhostFugitive
  - type: FugitiveRule
  - type: DynamicRuleCost
    cost: 65

- type: entity
  id: PlanetPrison
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: PlanetPrisonRule

- type: entity
  id: GreenShitStationEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: BasicCalmGameRulesTable

- type: entityTable
  id: BasicCalmGameRulesTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
      - !type:NestedSelector
        tableId: BasicCalmEventsTableGreenShit #BasicCalmEventsTable Когда нибудь вернуть
      - !type:NestedSelector
        tableId: CargoGiftsTable
      - !type:NestedSelector
        tableId: CalmPestEventsTable
