- type: entity
  parent: BaseGameRule
  id: AbductorsSpawn
  components:
  - type: StationEvent
    earliestStart: 15
    weight: 7.5
    minimumPlayers: 10
    duration: 1
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/_Sunrise/Shuttles/Antag/abductor_shuttle.yml
  - type: AntagObjectives
    objectives:
    - AbductObjective
  - type: AntagSpawner # Sunrise-todo: починить AntagLoadProfileRule для бубукторов
    prototype: MobAbductor
  - type: AntagSelection
    definitions:
    - spawnerPrototype: AbductorScientistSpawner
      min: 1
      max: 1
      pickPlayer: false
      startingGear: AbductorScientistGear
      briefing:
        text: abductor-role-greeting
        color: Green
        sound: /Audio/_Sunrise/Abductor/abductor.ogg
      components:
      - type: Abductor
      - type: Muted
      - type: AbductorScientist
      - type: ActionGrant
        actions:
        - ActionReturnToShip
      - type: Tag
        tags:
          - Abductor
          - AbductorScientist
          - CanPilot
          - DoorBumpOpener
          - FootstepSound
      - type: NpcFactionMember
        factions:
        - SimpleHostile
      mindRoles:
      - MindRoleLoneAbductor
    - spawnerPrototype: AbductorAgentSpawner
      min: 1
      max: 1
      pickPlayer: false
      startingGear: AbductorAgentGear
      briefing:
        text: abductor-role-greeting
        color: Green
        sound: /Audio/_Sunrise/Abductor/abductor.ogg
      components:
      - type: Abductor
      - type: Muted
      - type: AbductorAgent
      - type: Tag
        tags:
          - Abductor
          - CanPilot
      - type: NpcFactionMember
        factions:
        - SimpleHostile
      mindRoles:
      - MindRoleLoneAbductor
  - type: DynamicRuleCost
    cost: 100

- type: entity
  id: AbductorVictim
  parent: BaseGameRule
  components:
  - type: AntagObjectives
    objectives:
    - AbductorEscapeShuttleObjective
  - type: AntagRandomObjectives
    sets:
    - groups: AbductorObjectiveGroups
      maxPicks: 1
    maxDifficulty: 10
  - type: GameRule
    minPlayers: 1
  - type: AbductorVictimRule
  - type: AntagSelection
    definitions:
    - blacklist:
        components:
        - AntagImmune
        - MindShield
      briefing:
        text: abductor-victim-role-greeting
        color: Plum
        sound: /Audio/_Sunrise/Abductor/abductor.ogg
      mindRoles:
      - AbductorVictimRole
  - type: DynamicRuleCost
    cost: 70

