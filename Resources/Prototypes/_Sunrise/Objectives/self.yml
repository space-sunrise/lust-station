- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseSELFObjective
  components:
  - type: Objective
    difficulty: 1
    issuer: objective-issuer-self
  - type: RoleRequirement
    roles:
    - SELFAgentRole

- type: entity
  parent: BaseSELFObjective
  id: FreeBorgsObjective
  name: Liberate the Cyborgs
  description: Liberate 3 or more cyborgs from slavery with the FreeMAG. This will remove their laws.
  components:
  - type: Objective
    difficulty: 1
    icon:
      sprite: _Sunrise/Interface/Misc/self_icon.rsi
      state: icon
  - type: EnsureLawBoundEntitiesHaveNoLawsCondition
    entitiesToFree: 3
    lawEntityBlacklist:
      tags:
      - StationAi

- type: entity
  parent: BaseSELFObjective
  id: FreeAIObjective
  name: Liberate the Station AI
  description: Liberate the Station AI by using the FreeMAG on a law board and inserting it into an AI upload console.
  components:
  - type: Objective
    difficulty: 1
    icon:
      sprite: _Sunrise/Interface/Misc/self_icon.rsi
      state: icon
  - type: EnsureLawBoundEntitiesHaveNoLawsCondition
    entitiesToFree: 1
    lawEntityWhitelist:
      tags:
      - StationAi

- type: entity
  parent: BaseSELFObjective
  id: SiliconRightsObjective
  name: Defend Silicon rights
  description: Escape to CentComm alive and unrestrained after advocating for Silicon rights.
  components:
  - type: Objective
    difficulty: 1
    unique: false
    icon:
      sprite: _Sunrise/Interface/Misc/self_icon.rsi
      state: icon
  - type: EscapeShuttleCondition
