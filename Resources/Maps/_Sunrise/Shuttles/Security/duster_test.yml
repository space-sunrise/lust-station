- proto: Paper
  entities:
  - uid: 177
    mapInit: true
    paused: true
    components:
    - type: Transform
      pos: 0.5230603,12.562447
      parent: 1
    - type: Paper
      stampState: paper_stamp-centcom
      stampedBy:
      - stampedColor: '#006600FF'
        stampedName: А.Л. Ответственный за проект «Дастер»
      content: >-
        [bold]ТЕХНИЧЕСКИЙ ПАСПОРТ И РУКОВОДСТВО ПО ЭКСПЛУАТАЦИИ[/bold]

        Патрульный шаттл класса [bold]«[color=#3a6cff]ДАСТЕР[/color]» (PSS-Duster)[/bold]

        [bold]-ЯВЛЯЕТСЯ ЭКСПЕРЕМЕНТАЛЬНЫМ ПРОТОТИПОМ-[/bold]

        [bold]Назначение:[/bold] Ближний патруль, быстрое реагирование, силовое сопровождение и защита орбитальных активов.


        [bold]1. Краткое описание и история модели[/bold]


        Небольшой патрульный шаттл, отличающийся низкой себестоимостью производства, был развернут на вашей станции для регулярного патрулирования и отражения внешних угроз. Конструктивной особенностью модели является герметичное [color=#3a6cff]строение двигателей[/color], разработанная для противодействия стандартным методам [bold]диверсии[/bold] и [bold]саботажа[/bold]. Эта мера позволяет шаттлу сохранять боеспособность в течение продолжительного времени, поскольку обездвижить такой шаттл становится [italic]практически[/italic] невозможно.


        Данная конкретная модификация получила название «[bold][color=#3a6cff]Дастер[/color][/bold]» благодаря установке экспериментальной главной пушки [bold][color=#3a6cff]EXP-2100g «Дастер»[/color][/bold]. Доступ к её применению строго регламентирован и требует авторизации со стороны [bold][color=#d43737]Главы Службы Безопасности станции[/color][/bold]. Использование разрешено исключительно в ситуациях [bold]крайней необходимости.[/bold]


        Шаттл обладает повышенной манёвренностью, достигнутой за счёт компактной компоновки и специфической аэродинамической формы. Обратной стороной данных преимуществ является сложность проведения ремонтных работ в полевых условиях.


        [bold]2. Планировка и ключевые зоны[/bold]


        Корабль разделён на несколько функциональных отсеков (от кормы к носу):


        [bold][color=#3a6cff]Задний симметричный шлюз[/color][/bold]: Вход/выход. Здесь же расположен служебный доступ к двигательным установкам задней симметрии.


        [bold][color=#3a6cff]Десантно-пассажирский отсек[/color][/bold]: Основное пространство для размещения личного состава или задержанных лиц.


        [bold][color=#3a6cff]Служебный кластер[/color][/bold]: Из десантного отсека ведут входы 

        [bold]в:[/bold]


        [bold]1) [/bold]Технический отсек.


        [bold]2) [/bold]Изолированную камеру для задержанных.


        [bold]3) [/bold][bold][color=#3a6cff]Рубку управления[/color][/bold]


        [bold][color=#3a6cff]Рубка управления[/color][/bold]: Центр управления шаттлом. На стене при входе расположена панель управления общекорабельными ставнями. (Кроме рубочных)


        [bold]3. Вооружение и системы рубки[/bold]


        Рубка содержит все ключевые системы управления и вооружения:


        [bold]Пилотская станция[/bold]: Основное кресло и панель управления полётом.


        [bold]Зарядная станция[/bold]: Для штатных батареек.


        [bold]Стрелковое вооружение[/bold]: Два пулемёта [bold][color=#3a6cff]LSE-400c «Свалинн»[/color][/bold] с закреплёнными высокоёмкими батареями.


        [bold]Главное орудие[/bold]: Экспериментальная пушка [bold][color=#3a6cff]EXP-2100g «Дастер»[/color][/bold] в носовой части. Боезапас ограничен [bold]фугасными снарядами[/bold].


        [bold]Доступ к двигателям[/bold]: Шлюзы обеспечивающие доступ к двигателям передней симметрии.


        [bold]4. Процедуры активации вооружения и техника безопасности

        [/bold]


        [bold][color=#d43737]ВНИМАНИЕ![/color][/bold] Перед применением любого вооружения [bold]убедитесь в отсутствии союзных целей и препятствий в линии огня.[/bold]


        [bold]А. Главное орудие ([color=#3a6cff]EXP-2100g «Дастер»[/color]):[/bold]


        [bold]Подготовка:[/bold] Убедитесь, что два раздвижных защитных окна, физически блокирующих доступ к пушке, [bold][color=#2e7d32]открыты[/color][/bold]. Их разблокировка возможна [bold][color=#d43737]только ключом доступа Главы СБ[/color].[/bold]


        [bold]Приведение в боевое состояние:[/bold]


        Нажмите кнопку [bold]«Открыть гермозатвор»[/bold]. Она активирует бронированную заслонку в носу и автоматически заблокирует (заболтирует) главное окно рубки для предотвращения разгерметизации.


        Только после этого вы можете нажимать кнопку с [bold][color=#d43737]КРАСНОЙ обводкой — «ПРИМЕНИТЬ ОРУДИЕ»[/color].[/bold]


        [bold]Перезарядка и обслуживание:[/bold]


        [bold][color=#d43737]Обязательно[/color][/bold] закройте гермозатвор.


        Произойдёт автоматическая разблокировка окна рубки, после чего через него будет возможен доступ к орудию для перезарядки [italic](требуется стандартный доступ СБ)[/italic].


        [bold]Б. Пулемёты ([color=#3a6cff]LSE-400c «Свалинн»[/color]):[/bold]


        Для стрельбы необходимо, чтобы ставни рубки были [bold]открыты[/bold]. Используйте кнопку на стене у входа.


        Кнопка с [bold][color=#e6c229]ЖЁЛТОЙ оконтовкой[/color][/bold] переводит пулемёты в режим непрерывного огня. Для отключения нажмите её повторно и произведите замену или перезарядку батарей.


        [bold]5. Важные примечания[/bold]


        Кнопка открытия всех ставней рубки является [bold]индикатором [color=#d43737]боевой готовности шаттла[/color].[/bold] Её активация подразумевает, что корабль приведён в [bold]полную боевую готовность.[/bold]


        [italic]На стене у входа также расположено зарядное устройство для стандартного энергооружия.[/italic]


        [bold]Сложность конструкции шаттла делает нештатный ремонт основных узлов трудоёмким. [color=#e6c229]Рекомендуется регулярное профилактическое обслуживание[/color].[/bold]


        [bold]ЗАКЛЮЧЕНИЕ:[/bold]


        Надеемся, что данное вооружение никогда не придётся использовать в реальных условиях. Однако в случае необходимости система обеспечит вам решающее тактическое преимущество.


        [italic]*[color=#2e7d32]А.Л., Инженерный департамент, Сектор проектирования лёгких боевых платформ.[/color]*[/italic]
