        Оружие и тип патронов к нему:



        Двуствольное ружьё стандартного типа. .50 Ружейные.


        Способ получения оружия и патронов к нему:


        Оружие выдано Центральным Командованием на личное пользование на всё время протяжения смены.


        В случае необходимости пополнения боекомплекта, Зоотехник обязан направиться ко входу Брига и вызвать по гарнитуре Смотрителя либо Главу Службы Безопасности либо заменяющего Смотрителя Офицера. Зоотехник имеет право запросить патроны .50 Ружейный травматического типа и Смотритель либо Глава Службы Безопасности либо Офицер заменяющий Смотрителя на своё усмотрение имеет право выдать запрошенные боеприпасы.


        При наличии справки о стабильном психическом здоровье у Зоотехника, предъявленной там же, на месте, Смотритель либо Глава Службы Безопасности либо Офицер, заменяющий Смотрителя обязаны выдать запрошенные патроны, в противном случае это будет считаться нарушением 209 статьи Корпоративного Закона.


        При чрезвычайной ситуации на Станции, либо угрозе её полного уничтожения либо нападении Внешних Организаций, Зоотехник имеет право запросить летальные боеприпасы. В случае отказа со стороны Смотрителя, Главы Службы Безопасности либо Офицера, заменяющего Смотрителя, это будет считаться нарушением 409 статьи Корпоративного Закона.


