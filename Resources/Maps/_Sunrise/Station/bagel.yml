        В результате эксперимента 341, подопытный подвергался нескольким десяткам психических пыток для создания супер-солдата на протяжении тридцати шести дней. Примечательные события:

        [bullet]На седьмой день он начал проявлять признаки расстройства. Ему стали мерещаться тени, "следящие за ним".

        [bullet]На девятнадцатый день у него появился вымышленный друг. Он назвал его Джон.

        [bullet]На тридцатый день появился Авиан. Он несколько раз "дрался" с "ним" и по собственным заявлениям "убил" его.

        [bullet]На тридцать шестой день, подопытный, виня себя в "убийстве" Авиана попытался сбежать от охраны и был ликвидирован охраной.


        Считаем что необходимо [bold]ПОЛНОСТЬЮ[/bold] отказаться от экспериментов подобного рода и признать план по выращиванию суперсолдата [bold]невозможным[/bold]
