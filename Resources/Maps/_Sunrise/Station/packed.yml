        [italic]    Пусть звезды пронесут мое имя по линии времени, ибо я, подобно им, несу в себе свет, что извергает моя душа. Когда зло сталкивается со мной и терпит неудачу раз за разом, я лишь смеюсь вслед ему. 

            Благодарю вселенную вновь и вновь, ибо я, Пак Го Ун, благославлена ими и теперь несу большое бремя, чтобы озарить путь тем, кто всегда терялся в темноте. Смысл моего существования теперь таков. 

            Неразумные, полные невежества, смеют высказываться сомнительно и недооценивают мое стремление, но судьба расставит все по своим местам! Я уверена, что мой свет угаснет только с поглощением последнего фотона. В этой вселенной.[/italic]
